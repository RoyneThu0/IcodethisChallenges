<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reviews #1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .review-card {
        background: #231f32 !important;
        border-color: #4a3b72 !important;
      }

      .review-card .name {
        color: #f8fafc !important;
      }

      .review-card .category,
      .review-card .date {
        color: #94a3b8 !important;
      }

      .review-card .body {
        color: #e2e8f0 !important;
      }

      .review-card .helpful-btn,
      .review-card .share-btn {
        background: #1b172a !important;
        border-color: #3c3358 !important;
        color: #cbd5e1 !important;
      }

      #sortSelect option {
        background: #231f32;
        color: #f8fafc;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-[#1d1c2c] bg-[radial-gradient(circle_at_15%_15%,#312155_0%,#1d1c2c_35%),radial-gradient(circle_at_85%_10%,#432f69_0%,#1d1c2c_40%)] text-white"
  >
    <main
      class="mx-auto flex min-h-screen w-full max-w-5xl items-start justify-center px-4 py-10"
    >
      <section
        class="w-full rounded-2xl border border-[#3e3261] bg-[#2c2446] p-5 shadow-[0_20px_50px_-25px_rgba(10,5,24,0.85)] sm:p-8"
        aria-label="Customer reviews"
      >
        <header class="flex flex-wrap items-center justify-between gap-4">
          <div>
            <p class="text-xs uppercase tracking-[0.18em] text-purple-200">
              Product Feedback
            </p>
            <h1 class="mt-1 text-2xl font-bold tracking-tight sm:text-3xl">
              Reviews
            </h1>
          </div>
          <div class="text-right" aria-label="Average rating">
            <span id="averageRating" class="block text-2xl font-extrabold"
              >0.0</span
            >
            <div
              class="stars flex justify-end gap-1 text-yellow-400"
              id="averageStars"
              aria-hidden="true"
            ></div>
          </div>
        </header>

        <div class="mt-5 grid gap-3 sm:grid-cols-[1fr_auto]">
          <label
            class="flex min-h-12 items-center gap-3 rounded-xl border border-[#4a3b72] bg-[#231f32] px-4"
            for="searchInput"
          >
            <i class="fa-solid fa-magnifying-glass text-slate-400"></i>
            <input
              id="searchInput"
              type="text"
              placeholder="Search reviews"
              class="w-full border-0 bg-transparent text-sm text-white placeholder:text-slate-500 focus:outline-none"
            />
          </label>

          <label
            class="flex min-h-12 items-center gap-2 rounded-xl border border-[#4a3b72] bg-[#231f32] px-4"
            for="sortSelect"
          >
            <span class="text-sm text-slate-400">Sort</span>
            <select
              id="sortSelect"
              class="w-full min-w-36 border-0 bg-transparent text-sm text-white focus:outline-none"
            >
              <option value="newest">Newest</option>
              <option value="highest">Highest rated</option>
              <option value="lowest">Lowest rated</option>
            </select>
          </label>
        </div>

        <div class="mt-4 flex flex-wrap gap-2" id="filters"></div>

        <div
          class="mt-4 flex flex-wrap items-center justify-between gap-2 text-sm"
        >
          <p id="resultsCount" class="text-slate-300">0 reviews</p>
          <button
            id="resetFilters"
            type="button"
            class="rounded-md border border-purple-400/30 px-3 py-1.5 text-xs font-semibold text-purple-200 transition hover:bg-purple-500/20"
          >
            Reset filters
          </button>
        </div>

        <section
          class="mt-4 grid gap-3"
          id="reviewsList"
          aria-live="polite"
        ></section>
      </section>
    </main>

    <template id="reviewTemplate">
      <article
        class="review-card rounded-xl border border-[#4a3b72] bg-[#231f32] p-4 shadow-[0_10px_30px_-20px_rgba(0,0,0,0.8)]"
      >
        <header class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3">
            <span
              class="avatar grid h-10 w-10 place-items-center rounded-full text-sm font-bold text-white"
            ></span>
            <div>
              <h2 class="name text-base font-semibold text-white"></h2>
              <p class="category mt-0.5 text-xs text-slate-400"></p>
            </div>
          </div>
          <div class="rating flex gap-1 text-yellow-400"></div>
        </header>
        <p class="body mt-4 text-sm leading-relaxed text-slate-100"></p>
        <footer class="mt-4 flex flex-wrap items-center justify-between gap-3">
          <time class="date text-xs text-slate-400"></time>
          <div class="actions flex w-full gap-2 sm:w-auto">
            <button
              class="helpful-btn flex-1 rounded-md border border-[#3c3358] bg-[#1b172a] px-3 py-2 text-xs text-slate-300 transition hover:border-purple-400 hover:text-white sm:flex-none"
              type="button"
            ></button>
            <button
              class="share-btn flex-1 rounded-md border border-[#3c3358] bg-[#1b172a] px-3 py-2 text-xs text-slate-300 transition hover:border-purple-400 hover:text-white sm:flex-none"
              type="button"
            >
              <i
                class="fa-solid fa-arrow-up-from-bracket"
                aria-hidden="true"
              ></i>
              <span class="ml-1.5">Share</span>
            </button>
          </div>
        </footer>
      </article>
    </template>

    <script>
      const reviews = [
        {
          id: 1,
          name: "Jesse Hopkins",
          category: "Design",
          rating: 5,
          text: "Gorgeous design, very responsive, and surprisingly comfortable for all-day use.",
          date: "2026-05-17",
          helpful: 12,
          color: "#f97316",
        },
        {
          id: 2,
          name: "Alice Banks",
          category: "Quality",
          rating: 4,
          text: "The chassis feels premium and sturdy. Buttons are tactile and feedback is consistent.",
          date: "2026-04-03",
          helpful: 8,
          color: "#10b981",
        },
        {
          id: 3,
          name: "Mika Patel",
          category: "Features",
          rating: 5,
          text: "Feature set is complete without feeling bloated. Setup took less than ten minutes.",
          date: "2026-05-28",
          helpful: 16,
          color: "#0ea5e9",
        },
        {
          id: 4,
          name: "Noah Rivera",
          category: "Value",
          rating: 3,
          text: "Solid product, but accessory pricing pushes the total cost a bit too high.",
          date: "2026-03-22",
          helpful: 4,
          color: "#ef4444",
        },
        {
          id: 5,
          name: "Priya Nair",
          category: "Experience",
          rating: 4,
          text: "The learning curve is gentle and the interface feels intuitive from day one.",
          date: "2026-05-06",
          helpful: 11,
          color: "#8b5cf6",
        },
      ];

      const filtersContainer = document.getElementById("filters");
      const reviewsList = document.getElementById("reviewsList");
      const searchInput = document.getElementById("searchInput");
      const sortSelect = document.getElementById("sortSelect");
      const resultsCount = document.getElementById("resultsCount");
      const resetFilters = document.getElementById("resetFilters");
      const averageRating = document.getElementById("averageRating");
      const averageStars = document.getElementById("averageStars");
      const reviewTemplate = document.getElementById("reviewTemplate");
      const chipBaseClass =
        "rounded-md border px-3 py-2 text-xs font-medium transition";
      const chipActiveClass = "border-purple-400 bg-purple-500 text-white";
      const chipInactiveClass =
        "border-[#4a3b72] bg-[#231f32] text-slate-300 hover:border-purple-400/70 hover:text-white";

      const state = {
        query: "",
        category: "All",
        sortBy: "newest",
      };

      const categories = [
        "All",
        ...new Set(reviews.map((review) => review.category)),
      ];

      function buildStars(rating) {
        return Array.from({ length: 5 }, (_, index) =>
          index < rating
            ? '<i class="fa-solid fa-star"></i>'
            : '<i class="fa-regular fa-star"></i>',
        ).join("");
      }

      function formatDate(isoDate) {
        return new Date(isoDate).toLocaleDateString(undefined, {
          month: "short",
          day: "numeric",
          year: "numeric",
        });
      }

      function showToast(message) {
        let toast = document.querySelector(".js-toast");
        if (!toast) {
          toast = document.createElement("div");
          toast.className =
            "js-toast pointer-events-none fixed bottom-5 left-1/2 -translate-x-1/2 translate-y-3 rounded-full bg-[#120f1d] px-4 py-2 text-xs text-purple-100 opacity-0 shadow-xl transition-all duration-200";
          document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.classList.remove("opacity-0", "translate-y-3");
        toast.classList.add("opacity-100", "translate-y-0");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => {
          toast.classList.remove("opacity-100", "translate-y-0");
          toast.classList.add("opacity-0", "translate-y-3");
        }, 1500);
      }

      function getFilteredReviews() {
        const normalizedQuery = state.query.trim().toLowerCase();

        const filtered = reviews.filter((review) => {
          const matchesCategory =
            state.category === "All" || review.category === state.category;
          const matchesQuery =
            !normalizedQuery ||
            review.name.toLowerCase().includes(normalizedQuery) ||
            review.text.toLowerCase().includes(normalizedQuery) ||
            review.category.toLowerCase().includes(normalizedQuery);

          return matchesCategory && matchesQuery;
        });

        return filtered.sort((a, b) => {
          if (state.sortBy === "highest") return b.rating - a.rating;
          if (state.sortBy === "lowest") return a.rating - b.rating;
          return new Date(b.date) - new Date(a.date);
        });
      }

      function updateSummary() {
        const avg =
          reviews.reduce((total, review) => total + review.rating, 0) /
          reviews.length;
        averageRating.textContent = avg.toFixed(1);
        averageStars.innerHTML = buildStars(Math.round(avg));
      }

      function renderFilters() {
        filtersContainer.innerHTML = "";
        categories.forEach((category) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `${chipBaseClass} ${chipInactiveClass}`;
          button.textContent = category;
          button.dataset.category = category;
          if (category === state.category) {
            button.className = `${chipBaseClass} ${chipActiveClass}`;
          }
          button.addEventListener("click", () => {
            state.category = category;
            render();
          });
          filtersContainer.appendChild(button);
        });
      }

      function renderReviews(items) {
        reviewsList.innerHTML = "";

        if (!items.length) {
          reviewsList.innerHTML =
            '<p class="rounded-xl border border-dashed border-[#4a3b72] bg-[#231f32] p-4 text-center text-sm text-slate-300">No reviews match your current filters.</p>';
          return;
        }

        items.forEach((review) => {
          const node = reviewTemplate.content.cloneNode(true);
          const card = node.querySelector(".review-card");
          const avatar = node.querySelector(".avatar");
          const helpfulBtn = node.querySelector(".helpful-btn");
          const shareBtn = node.querySelector(".share-btn");

          card.style.backgroundColor = "#231f32";
          card.style.borderColor = "#4a3b72";
          helpfulBtn.style.backgroundColor = "#1b172a";
          helpfulBtn.style.borderColor = "#3c3358";
          shareBtn.style.backgroundColor = "#1b172a";
          shareBtn.style.borderColor = "#3c3358";

          avatar.style.background = review.color;
          avatar.textContent = review.name.charAt(0);
          node.querySelector(".name").textContent = review.name;
          node.querySelector(".category").textContent = review.category;
          node.querySelector(".rating").innerHTML = buildStars(review.rating);
          node.querySelector(".body").textContent = review.text;
          node.querySelector(".date").textContent = formatDate(review.date);
          helpfulBtn.innerHTML = `<i class="fa-regular fa-thumbs-up"></i> Helpful (${review.helpful})`;

          helpfulBtn.addEventListener("click", () => {
            review.helpful += 1;
            render();
          });

          shareBtn.addEventListener("click", async () => {
            const shareText = `${review.name}: ${review.text}`;
            try {
              if (navigator.clipboard) {
                await navigator.clipboard.writeText(shareText);
                showToast("Review copied to clipboard");
              } else {
                showToast("Clipboard not supported in this browser");
              }
            } catch {
              showToast("Unable to copy review right now");
            }
          });
          reviewsList.appendChild(node);
        });
      }

      function renderMeta(resultLength) {
        const label = resultLength === 1 ? "review" : "reviews";
        resultsCount.textContent = `${resultLength} ${label}`;
      }

      function render() {
        const filtered = getFilteredReviews();
        renderFilters();
        renderReviews(filtered);
        renderMeta(filtered.length);
      }

      searchInput.addEventListener("input", (event) => {
        state.query = event.target.value;
        render();
      });

      sortSelect.addEventListener("change", (event) => {
        state.sortBy = event.target.value;
        render();
      });

      resetFilters.addEventListener("click", () => {
        state.query = "";
        state.category = "All";
        state.sortBy = "newest";
        searchInput.value = "";
        sortSelect.value = "newest";
        render();
      });

      updateSummary();
      render();
    </script>
  </body>
</html>
