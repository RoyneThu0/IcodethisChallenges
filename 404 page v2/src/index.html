<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 page</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.globe.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      #your-element-selector {
        flex-grow: 1;
      }
    </style>
  </head>

  <body id="your-element-selector" class="flex items-center justify-center">
    <div class="w-full flex justify-center">
      <p
        class="text-[150px] md:text-[250px] font-bold font-sans opacity-60 text-[#FF3F81]"
      >
        404
      </p>
    </div>
    <div class="w-full flex flex-col">
      <span class="text-center text-slate-300"
        >Oops, The page you are looking for was moved, removed, <br />
        renamed or might never have exsisted
      </span>
      <div class="mt-3 w-full flex items-center justify-center">
        <button
          class="bg-slate-400/20 text-red-400 hover:text-white hover:bg-red-600/60 px-4 py-3 rounded-lg duration-300"
        >
          Return home
        </button>
      </div>
    </div>

    <script>
      VANTA.GLOBE({
        el: "#your-element-selector",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
      });
    </script>
  </body>
</html>
