<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 page</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.rings.min.js"></script>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      #your-element-selector {
        flex-grow: 1;
      }
    </style>
  </head>

  <body id="your-element-selector" class="flex items-center justify-center">
    <div class="w-full flex justify-center">
      <p
        class="text-[150px] md:text-[250px] font-bold font-sans text-slate-50 drop-shadow-[0_8px_30px_rgba(15,23,42,0.45)]"
      >
        404
      </p>
    </div>
    <div class="w-full flex flex-col">
      <span class="text-center text-slate-200"
        >The link you clicked may be broken or the <br />
        page may have been removed
      </span>
      <div class="mt-3 w-full flex items-center justify-center">
        <p class="text-slate-100">
          Visit the
          <span class="text-cyan-300 hover:underline cursor-pointer"
            >home page</span
          >
          or
          <span class="text-cyan-300 hover:underline cursor-pointer"
            >contact me</span
          >
        </p>
      </div>
    </div>

    <script>
      VANTA.RINGS({
        el: "#your-element-selector",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        backgroundColor: 0x0f172a,
        color: 0x67e8f9,
      });
    </script>
  </body>
</html>
