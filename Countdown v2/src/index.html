<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Countdown</title>
    <meta name="theme-color" content="#081029" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./input.css" />
  </head>

  <body
    class="min-h-screen flex items-center justify-center bg-cover bg-center relative"
    style="
      background-image: url(https://plus.unsplash.com/premium_photo-1664004039931-dad75c08bc91?q=80&w=2071&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    "
  >
    <div class="absolute inset-0 bg-black/45 pointer-events-none"></div>

    <main
      class="relative z-10 w-11/12 max-w-4xl p-8 md:p-12 mt-6 flex items-center justify-center flex-col count-card"
    >
      <h1
        class="heading text-3xl sm:text-4xl font-semibold text-white text-center"
      >
        Until New Beginnings
      </h1>

      <section
        id="count"
        class="grid sm:grid-cols-5 grid-cols-2 gap-6 text-white mt-6 w-full justify-items-center"
        aria-label="Countdown timer"
      >
        <div class="time-box flex flex-col items-center justify-center">
          <span id="months" class="value text-5xl sm:text-6xl">00</span>
          <p class="label text-sm sm:text-base mt-2">Months</p>
        </div>
        <div class="time-box flex flex-col items-center justify-center">
          <span id="days" class="value text-5xl sm:text-6xl">00</span>
          <p class="label text-sm sm:text-base mt-2">Days</p>
        </div>
        <div class="time-box flex flex-col items-center justify-center">
          <span id="hours" class="value text-5xl sm:text-6xl">00</span>
          <p class="label text-sm sm:text-base mt-2">Hours</p>
        </div>
        <div class="time-box flex flex-col items-center justify-center">
          <span id="minutes" class="value text-5xl sm:text-6xl">00</span>
          <p class="label text-sm sm:text-base mt-2">Minutes</p>
        </div>
        <div class="time-box flex flex-col items-center justify-center">
          <span id="seconds" class="value text-5xl sm:text-6xl">00</span>
          <p class="label text-sm sm:text-base mt-2">Seconds</p>
        </div>
      </section>

      <p class="sr-only" aria-live="polite" id="countdown-status">
        Countdown active
      </p>
    </main>

    <script>
      const targetDate = new Date("2027-01-01T00:00:00").getTime();

      const pad = (n) => String(n).padStart(2, "0");

      const countdown = setInterval(() => {
        const now = Date.now();
        const distance = targetDate - now;

        const months = Math.floor(distance / (1000 * 60 * 60 * 24 * 30));
        const days = Math.floor(
          (distance % (1000 * 60 * 60 * 24 * 30)) / (1000 * 60 * 60 * 24),
        );
        const hours = Math.floor(
          (distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60),
        );
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("months").innerText =
          months >= 100 ? months : pad(months);
        document.getElementById("days").innerText = pad(days);
        document.getElementById("hours").innerText = pad(hours);
        document.getElementById("minutes").innerText = pad(minutes);
        document.getElementById("seconds").innerText = pad(seconds);

        document.getElementById("countdown-status").innerText =
          distance >= 0 ? "Countdown active" : "Countdown finished";

        if (distance < 0) {
          clearInterval(countdown);
        }
      }, 1000);
    </script>
  </body>
</html>
