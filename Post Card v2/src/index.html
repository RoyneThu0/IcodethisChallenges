<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post card</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="w-screen h-screen flex bg-cover bg-center items-center justify-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1504672281656-e4981d70414b?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8Z3JheXxlbnwwfDB8MHx8fDA%3D);
    "
  >
    <div
      class="w-11/12 max-w-lg bg-gray-800/30 backdrop-blur-sm p-6 rounded-lg flex flex-col items-center justify-center"
    >
      <div
        class="w-full md:flex grid md:grid-cols-2 grid-cols-1 items-start justify-center"
      >
        <div
          class="md:w-1/5 w-full flex items-center justify-center shrink-0 mr-10"
        >
          <img
            class="w-20 h-20 rounded-full border-4 border-transparent hover:border-blue-400 duration-500 hover:scale-110 shadow-lg"
            src="https://images.unsplash.com/photo-1623605931891-d5b95ee98459?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fG1hbnxlbnwwfDJ8MHx8fDA%3D"
            alt=""
          />
        </div>
        <div class="w-full flex flex-col items-start justify-center">
          <p
            id="message"
            class="w-full text-sm text-red-300 text-start min-h-[1.25rem]"
          ></p>
          <textarea
            id="postInput"
            rows="4"
            class="w-full rounded-2xl border border-slate-600 bg-slate-950/70 text-white p-4 mt-2 resize-none focus:outline-none focus:border-blue-400 placeholder:text-slate-500"
            placeholder="What's happening?"
          ></textarea>
          <div
            class="w-full mt-4 md:flex grid md:grid-cols-2 grid-cols-1 items-center justify-between"
          >
            <div
              class="flex w-full items-center justify-center md:justify-start gap-4"
            >
              <i class="fa-solid fa-image text-slate-400 text-2xl"></i>
              <i class="fa-solid fa-video text-slate-400 text-2xl"></i>
              <i class="fa-solid fa-face-smile text-slate-400 text-2xl"></i>
            </div>
            <button
              id="postButton"
              type="button"
              class="bg-blue-500 md:mt-0 mt-3 hover:bg-blue-600 duration-300 w-full md:w-1/3 py-2 rounded-lg text-white font-semibold"
            >
              Post
            </button>
          </div>
        </div>
      </div>
      <div id="postsContainer" class="w-full mt-6 space-y-4"></div>
    </div>

    <script>
      const postInput = document.getElementById("postInput");
      const postButton = document.getElementById("postButton");
      const postsContainer = document.getElementById("postsContainer");
      const message = document.getElementById("message");

      function formatPostTime(date) {
        return date.toLocaleString("en-US", {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function clearError() {
        message.textContent = "";
      }

      function showError(text) {
        message.textContent = text;
      }

      function createPostCard(text) {
        const card = document.createElement("div");
        card.className =
          "w-full bg-slate-900/80 border border-white/10 rounded-3xl p-4 shadow-2xl";

        const header = document.createElement("div");
        header.className = "flex items-center justify-between gap-3";

        const author = document.createElement("div");
        author.className = "flex items-center gap-3";

        const avatar = document.createElement("img");
        avatar.src =
          "https://images.unsplash.com/photo-1623605931891-d5b95ee98459?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTh8fG1hbnxlbnwwfDJ8MHx8fDA%3D";
        avatar.alt = "User avatar";
        avatar.className = "w-11 h-11 rounded-full border-2 border-blue-500";

        const meta = document.createElement("div");
        const authorName = document.createElement("p");
        authorName.className = "text-sm text-slate-100 font-semibold";
        authorName.textContent = "Post Maker";

        const timestamp = document.createElement("p");
        timestamp.className = "text-xs text-slate-400";
        timestamp.textContent = formatPostTime(new Date());

        meta.appendChild(authorName);
        meta.appendChild(timestamp);
        author.appendChild(avatar);
        author.appendChild(meta);

        const badge = document.createElement("span");
        badge.className =
          "text-[10px] uppercase tracking-[0.25em] text-blue-300";
        badge.textContent = "Live";

        header.appendChild(author);
        header.appendChild(badge);

        const body = document.createElement("p");
        body.className = "mt-4 text-slate-100 whitespace-pre-wrap leading-7";
        body.textContent = text;

        card.appendChild(header);
        card.appendChild(body);

        return card;
      }

      function addPost() {
        const value = postInput.value.trim();
        if (!value) {
          showError("Please type something before posting.");
          postInput.focus();
          return;
        }

        clearError();
        const postCard = createPostCard(value);
        postsContainer.prepend(postCard);
        postInput.value = "";
        postInput.focus();
      }

      postButton.addEventListener("click", addPost);
      postInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          addPost();
        }
      });
    </script>
  </body>
</html>
