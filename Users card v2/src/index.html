<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users Card v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .bg-blob::before {
        content: "";
        position: absolute;
        width: 220px;
        height: 220px;
        left: -60px;
        top: -40px;
        background: rgba(99, 102, 241, 0.06);
        border-radius: 9999px;
        filter: blur(22px);
      }
      .bg-blob::after {
        content: "";
        position: absolute;
        width: 160px;
        height: 160px;
        right: -40px;
        bottom: -20px;
        background: rgba(99, 102, 241, 0.04);
        border-radius: 9999px;
        filter: blur(18px);
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
    <div class="relative bg-blob">
      <div
        class="w-[420px] flex flex-col items-center rounded-2xl shadow-2xl p-8 pt-10 text-center"
      >
        <div class="w-[200px] h-[200px] relative mt-5 mb-4">
          <img
            class="rounded-full hover:border-blue-400 hover:scale-110 transition-all duration-300 ease-in-out w-14 h-14 border-4 border-slate-200 absolute left-1/2 transform -translate-x-1/2 -top-[20px]"
            src="https://images.unsplash.com/photo-1586299485759-f62264d6b63f?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fHBlb3BsZXxlbnwwfDJ8MHx8fDA%3D"
          />
          <img
            class="rounded-full hover:border-blue-400 hover:scale-110 transition-all duration-300 ease-in-out w-14 h-14 border-4 border-slate-200 absolute top-[40px] -left-[10px]"
            src="https://images.unsplash.com/photo-1542305983-c4100e4b8cd2?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzZ8fHBlb3BsZXxlbnwwfDJ8MHx8fDA%3D"
          />
          <img
            class="rounded-full hover:border-blue-400 hover:scale-110 transition-all duration-300 ease-in-out w-14 h-14 border-4 border-slate-200 absolute top-[40px] left-[140px]"
            src="https://images.unsplash.com/photo-1509335035496-c47fc836517f?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MzV8fHBlb3BsZXxlbnwwfDJ8MHx8fDA%3D"
          />
          <img
            class="rounded-full hover:border-blue-400 hover:scale-110 transition-all duration-300 ease-in-out w-14 h-14 border-4 border-slate-200 absolute top-[120px] left-[20px]"
            src="https://images.unsplash.com/photo-1574843922290-93b144e38091?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NDR8fHBlb3BsZXxlbnwwfDJ8MHx8fDA%3D"
          />
          <img
            class="rounded-full hover:border-blue-400 hover:scale-110 transition-all duration-300 ease-in-out w-14 h-14 border-4 border-slate-200 absolute top-[120px] left-[120px]"
            src="https://images.unsplash.com/photo-1613253994197-496a1d018664?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NDN8fHBlb3BsZXxlbnwwfDJ8MHx8fDA%3D"
          />
        </div>

        <h2 class="text-slate-800 text-lg font-semibold mb-3">
          Looking for more inspiration?
        </h2>
        <p class="text-sm text-slate-500 px-8 mb-6">
          Duis aute irure dolor in reprehenderit in voluptate velit esse cillum
          dolore eu fugiat nulla pariatur.
        </p>

        <div class="flex justify-center">
          <a
            class="inline-flex items-center justify-center px-8 py-3 rounded-full bg-gradient-to-r from-indigo-500 to-indigo-400 text-white font-semibold shadow-lg hover:scale-[1.01] transition transform"
            href="#"
            >SEE FEATURED CREATIVES</a
          >
        </div>
      </div>

      <div
        class="absolute inset-0 flex items-end justify-center pointer-events-none"
      >
        <div
          class="w-[320px] h-8 bg-white rounded-xl translate-y-8 opacity-30 blur-[20px]"
        ></div>
      </div>
    </div>
  </body>
</html>
