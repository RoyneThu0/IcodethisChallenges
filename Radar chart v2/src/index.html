<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radar Chart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body
    class="w-screen min-h-screen bg-cover bg-center flex flex-col items-center justify-center p-4 sm:p-8 font-sans antialiased text-white selection:bg-rose-500 selection:text-white"
    style="
      background-image:
        linear-gradient(
          to bottom,
          rgba(15, 23, 42, 0.75),
          rgba(15, 23, 42, 0.85)
        ),
        url(https://i.pinimg.com/736x/0f/95/36/0f9536d0e51f748f94ea1c72c22a0c28.jpg);
    "
  >
    <div
      class="relative flex w-full max-w-6xl flex-col items-center gap-6 rounded-3xl p-6 transition-all duration-500 sm:p-10"
    >
      <div
        class="group z-20 flex w-full flex-col items-center justify-center p-2 cursor-pointer sm:absolute sm:-left-10 sm:top-1/2 sm:w-72 sm:-translate-y-1/2"
      >
        <div
          class="relative flex w-full items-center justify-center overflow-visible isolate"
        >
          <div
            class="absolute z-0 h-40 w-40 rounded-full bg-red-500/70 blur-3xl transition duration-500 group-hover:scale-110 group-hover:bg-rose-400/80 sm:h-52 sm:w-52"
          ></div>
          <img
            class="relative z-10 max-w-64 drop-shadow-[0_10px_15px_rgba(0,0,0,0.6)] duration-500 ease-out group-hover:-translate-y-2 group-hover:scale-110 sm:max-w-72"
            src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/f0d9e681-e324-435a-a219-599fbc57e57b/dhn0vbh-a885c1e1-06d1-4f08-8413-6cfd42a812c0.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi9mMGQ5ZTY4MS1lMzI0LTQzNWEtYTIxOS01OTlmYmM1N2U1N2IvZGhuMHZiaC1hODg1YzFlMS0wNmQxLTRmMDgtODQxMy02Y2ZkNDJhODEyYzAucG5nIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.29oY2qv14F9q81ZCNqXC5dxyMq_HJ90Iw6Zbgc4J3XI"
            alt="Lightning McQueen"
          />
        </div>
      </div>

      <div
        class="relative z-10 mx-auto flex w-full max-w-xl items-center justify-center rounded-2xl border border-slate-800/80 bg-slate-950/80 p-4 shadow-inner backdrop-blur-lg sm:w-lg sm:max-w-none sm:p-6"
      >
        <canvas id="radarChart" width="400" height="400"></canvas>
      </div>

      <div
        class="group z-20 flex w-full flex-col items-center justify-center p-2 cursor-pointer sm:absolute sm:-right-10 sm:top-1/2 sm:w-72 sm:-translate-y-1/2"
      >
        <div
          class="relative flex w-full items-center justify-center overflow-visible isolate"
        >
          <div
            class="absolute z-0 h-40 w-40 rounded-full bg-cyan-400/70 blur-3xl transition duration-500 group-hover:scale-110 group-hover:bg-sky-300/80 sm:h-52 sm:w-52"
          ></div>
          <img
            class="relative z-10 max-w-56 drop-shadow-[0_10px_15px_rgba(0,0,0,0.6)] duration-500 ease-out group-hover:-translate-y-2 group-hover:scale-110 sm:max-w-64"
            src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/d78f2d55-1ade-4120-9cf8-2e781b7c5c1b/diqyfws-1dd62771-1ee7-4c08-a1dc-e5b30873824d.png/v1/fill/w_1280,h_720/jackson_storm_png_1_by_mrchoo111_diqyfws-fullview.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9NzIwIiwicGF0aCI6Ii9mL2Q3OGYyZDU1LTFhZGUtNDEyMC05Y2Y4LTJlNzgxYjdjNWMxYi9kaXF5ZndzLTFkZDYyNzcxLTFlZTctNGMwOC1hMWRjLWU1YjMwODczODI0ZC5wbmciLCJ3aWR0aCI6Ijw9MTI4MCJ9XV0sImF1ZCI6WyJ1cm46c2VydmljZTppbWFnZS5vcGVyYXRpb25zIl19.ZgcaI5xnxEc1x80yq-b_YpnjMCQcQVA7QRXtknk-S3s"
            alt="Jackson Storm"
          />
        </div>
      </div>
    </div>

    <script>
      const ctx = document.getElementById("radarChart").getContext("2d");

      Chart.defaults.color = "rgba(241, 245, 249, 0.85)";
      Chart.defaults.font.family = "'system-ui', '-apple-system', 'sans-serif'";
      Chart.defaults.font.size = 13;
      Chart.defaults.font.weight = "600";

      const radarChart = new Chart(ctx, {
        type: "radar",
        data: {
          labels: [
            "Top Speed",
            "Acceleration",
            "Drifting",
            "Experience",
            "Heart & Determination",
            "Technology",
          ],
          datasets: [
            {
              label: "Lightning McQueen",
              data: [88, 85, 98, 100, 99, 60],
              backgroundColor: "rgba(239, 68, 68, 0.25)",
              borderColor: "rgba(239, 68, 68, 1)",
              pointBackgroundColor: "rgba(239, 68, 68, 1)",
              pointBorderColor: "#fff",
              pointHoverBackgroundColor: "#fff",
              pointHoverBorderColor: "rgba(239, 68, 68, 1)",
              pointRadius: 4,
              pointHoverRadius: 6,
              borderWidth: 2.5,
            },
            {
              label: "Jackson Storm",
              data: [100, 98, 70, 50, 35, 100],
              backgroundColor: "rgba(59, 130, 246, 0.25)",
              borderColor: "rgba(59, 130, 246, 1)",
              pointBackgroundColor: "rgba(59, 130, 246, 1)",
              pointBorderColor: "#fff",
              pointHoverBackgroundColor: "#fff",
              pointHoverBorderColor: "rgba(59, 130, 246, 1)",
              pointRadius: 4,
              pointHoverRadius: 6,
              borderWidth: 2.5,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: "top",
              labels: {
                padding: 20,
                usePointStyle: true,
                pointStyle: "circle",
                font: {
                  size: 14,
                  weight: "bold",
                },
              },
            },
            tooltip: {
              backgroundColor: "rgba(15, 23, 42, 0.9)",
              titleFont: { size: 14, weight: "bold" },
              bodyFont: { size: 13 },
              padding: 12,
              cornerRadius: 10,
              borderColor: "rgba(51, 65, 85, 0.8)",
              borderWidth: 1,
            },
          },
          scales: {
            r: {
              angleLines: {
                display: true,
                color: "rgba(148, 163, 184, 0.15)",
                lineWidth: 1,
              },
              grid: {
                color: "rgba(148, 163, 184, 0.15)",
                circular: true,
              },
              pointLabels: {
                color: "rgba(241, 245, 249, 0.9)",
                font: {
                  size: 12,
                  weight: "700",
                },
              },
              ticks: {
                display: false,
                stepSize: 20,
              },
              suggestedMin: 0,
              suggestedMax: 100,
            },
          },
        },
      });
    </script>
  </body>
</html>
