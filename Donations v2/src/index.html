<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donate Card</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .amount-pill {
        border: 1px solid #e5e7eb;
        color: #4b5563;
        background: #e5e7eb;
        border-radius: 0.75rem;
        padding: 0.25rem 1rem;
        transition: all 0.2s ease;
      }

      .amount-pill:hover {
        background: #f3f4f6;
      }

      .amount-pill.active {
        background: #ffffff;
        color: #111827;
        border: 2px solid #60a5fa;
      }

      .success-panel {
        max-height: 0;
        opacity: 0;
        transform: translateY(12px);
        overflow: hidden;
        transition: all 0.4s ease;
      }

      .success-panel.show {
        max-height: 140px;
        opacity: 1;
        transform: translateY(0);
      }

      .confetti-wrap {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .confetti-piece {
        position: absolute;
        top: -10%;
        width: 8px;
        height: 14px;
        border-radius: 2px;
        animation: confetti-fall 1.8s linear forwards;
      }

      @keyframes confetti-fall {
        0% {
          transform: translate3d(0, 0, 0) rotate(0deg);
          opacity: 1;
        }

        100% {
          transform: translate3d(var(--drift), 120vh, 0) rotate(640deg);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body
    class="relative w-screen h-screen bg-[#b9cbee] flex items-center justify-center"
  >
    <div
      class="absolute z-0 top-20 right-20 w-[450px] h-[450px] rounded-full blur-xl bg-[#dcd3ed]"
    ></div>

    <div
      class="absolute z-0 bottom-20 left-60 w-[250px] h-[250px] rounded-full blur-xl bg-[#dcd3ed]"
    ></div>

    <div
      class="absolute z-10 w-11/12 max-w-xl bg-white rounded-2xl p-1 shadow-2xl flex flex-col overflow-hidden ite"
    >
      <svg
        viewBox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg"
        class="rotate-12 absolute -top-28 -left-40 w-[400px] h-[400px] z-0"
      >
        <path
          fill="#f4e5c1"
          d="M43.9,-73.8C52.1,-62.9,50.9,-42.8,55.9,-26.9C61,-11.1,72.4,0.5,66.4,6.2C60.4,11.9,36.9,11.8,24.8,16.1C12.7,20.5,12,29.4,5,43.4C-1.9,57.4,-15,76.6,-26.7,78.7C-38.4,80.8,-48.6,65.9,-58.1,52C-67.7,38.1,-76.5,25.2,-79.5,10.8C-82.6,-3.6,-80,-19.5,-71,-29.7C-62.1,-40,-46.9,-44.7,-34,-53.4C-21.2,-62.1,-10.6,-74.8,3.6,-80.4C17.8,-86.1,35.6,-84.6,43.9,-73.8Z"
          transform="translate(100 100)"
        />
      </svg>
      <svg
        viewBox="0 0 200 200"
        xmlns="http://www.w3.org/2000/svg"
        class="rotate-12 absolute -top-32 -left-40 w-[400px] h-[400px] z-0"
      >
        <path
          fill="#fffbf3"
          d="M43.9,-73.8C52.1,-62.9,50.9,-42.8,55.9,-26.9C61,-11.1,72.4,0.5,66.4,6.2C60.4,11.9,36.9,11.8,24.8,16.1C12.7,20.5,12,29.4,5,43.4C-1.9,57.4,-15,76.6,-26.7,78.7C-38.4,80.8,-48.6,65.9,-58.1,52C-67.7,38.1,-76.5,25.2,-79.5,10.8C-82.6,-3.6,-80,-19.5,-71,-29.7C-62.1,-40,-46.9,-44.7,-34,-53.4C-21.2,-62.1,-10.6,-74.8,3.6,-80.4C17.8,-86.1,35.6,-84.6,43.9,-73.8Z"
          transform="translate(100 100)"
        />
      </svg>
      <div class="w-full flex items-start justify-end">
        <i
          class="fa-solid fa-xmark w-10 h-10 bg-gray-100 text-slate-400 hover:bg-[#dcd3ed] hover:text-white duration-300 rounded-full flex items-center justify-center p-2"
        ></i>
      </div>
      <div
        class="w-full z-10 md:flex grid md:grid-cols-2 grid-cols-1 p-5 items-start md:justify-start justify-center gap-12"
      >
        <div class="md:w-1/3 w-full flex items-center justify-center">
          <img
            class="w-24 h-24"
            src="https://freesvg.org/img/Cancer-Ribbon-15-2015120403.png"
            alt=""
          />
        </div>
        <div class="w-full flex flex-col items-start justify-center">
          <p class="text-3xl font-sans w-full text-center md:text-start">
            Your gift changes lives
          </p>
          <p
            class="mt-2 text-sm text-gray-500 w-full text-center md:text-start"
          >
            Pledge your support today so that we can <br />
            help more women in 2019.
          </p>
          <div
            class="w-full flex items-center md:justify-start justify-center gap-3 mt-5"
          >
            <div class="flex items-center justify-center gap-2 pt-5">
              <button
                type="button"
                class="amount-pill donation-amount"
                data-amount="5"
              >
                $5
              </button>
              <button
                type="button"
                class="amount-pill donation-amount"
                data-amount="10"
              >
                $10
              </button>
              <button
                type="button"
                class="amount-pill donation-amount"
                data-amount="15"
              >
                $15
              </button>

              <div class="bg-gray-200 flex rounded-lg w-fit">
                <p class="text-gray-700 p-2">$</p>
                <input
                  type="text"
                  name="custom_amount"
                  id="custom_amount"
                  class="border border-gray-200 w-fit focus:outline-none p-2 bg-white rounded-r-lg text-sm"
                  size="6"
                  placeholder="Amount"
                />
              </div>
            </div>
          </div>
          <div class="w-full mt-3 flex items-center justify-start">
            <button
              id="donate-btn"
              class="bg-pink-400 md:w-20 w-full text-white text-sm py-2 rounded-lg border border-transparent hover:border hover:border-black hover:bg-white hover:text-pink-400 duration-300"
            >
              DONATE
            </button>
          </div>
          <div
            id="success-message"
            class="success-panel mt-4 w-full rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-emerald-700"
          >
            Donation successful. Thank you for your support!
          </div>
        </div>
      </div>
    </div>
    <div id="confetti" class="confetti-wrap"></div>

    <script>
      const amountButtons = document.querySelectorAll(".donation-amount");
      const customAmountInput = document.getElementById("custom_amount");
      const donateButton = document.getElementById("donate-btn");
      const successMessage = document.getElementById("success-message");
      const confettiWrap = document.getElementById("confetti");

      let selectedAmount = null;

      amountButtons.forEach((button) => {
        button.addEventListener("click", () => {
          selectedAmount = button.dataset.amount;
          customAmountInput.value = "";

          amountButtons.forEach((pill) => pill.classList.remove("active"));
          button.classList.add("active");
        });
      });

      customAmountInput.addEventListener("input", () => {
        selectedAmount = customAmountInput.value.trim();
        amountButtons.forEach((pill) => pill.classList.remove("active"));
      });

      function launchConfetti() {
        const colors = ["#22c55e", "#f97316", "#3b82f6", "#ec4899", "#eab308"];

        for (let i = 0; i < 120; i += 1) {
          const piece = document.createElement("span");
          piece.className = "confetti-piece";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background =
            colors[Math.floor(Math.random() * colors.length)];
          piece.style.setProperty("--drift", `${Math.random() * 160 - 80}px`);
          piece.style.animationDelay = `${Math.random() * 0.45}s`;
          confettiWrap.appendChild(piece);

          setTimeout(() => piece.remove(), 2200);
        }
      }

      donateButton.addEventListener("click", () => {
        const amount = selectedAmount || customAmountInput.value.trim();

        if (!amount || Number(amount) <= 0 || Number.isNaN(Number(amount))) {
          successMessage.classList.remove("show");
          successMessage.textContent = "Please choose or enter a valid amount.";
          successMessage.classList.remove(
            "text-emerald-700",
            "bg-emerald-50",
            "border-emerald-200",
          );
          successMessage.classList.add(
            "text-rose-700",
            "bg-rose-50",
            "border-rose-200",
            "show",
          );
          return;
        }

        successMessage.textContent = `Donation successful. Thank you for your $${Number(amount)} support!`;
        successMessage.classList.remove(
          "text-rose-700",
          "bg-rose-50",
          "border-rose-200",
        );
        successMessage.classList.add(
          "text-emerald-700",
          "bg-emerald-50",
          "border-emerald-200",
          "show",
        );
        launchConfetti();
      });
    </script>
  </body>
</html>
