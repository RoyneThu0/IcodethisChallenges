<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="w-screen min-h-screen flex items-center justify-center bg-gradient-to-br from-sky-300 to-indigo-700 to-60%"
    style="
      background-image: url(https://plus.unsplash.com/premium_photo-1669749217762-7881bd68edaf?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTN8fHB1cnBsZSUyMGJhY2tncm91bmR8ZW58MHx8MHx8fDA%3D);
    "
  >
    <div
      class="w-11/12 max-w-lg bg-indigo-800 rounded-xl flex flex-col shadow-xl shadow-indigo-950"
    >
      <div class="bg-pink-500 py-1 rounded-t-xl"></div>
      <div class="flex items-center justify-between px-5 mt-3">
        <p class="text-white font-semibold text-2xl">One imposter remaining</p>
        <p>
          <i
            class="fa-solid fa-ellipsis text-white w-10 h-10 rounded-full p-3 cursor-pointer"
          ></i>
        </p>
      </div>
      <p class="mx-5 text-slate-400">18 tasks remaining</p>
      <p class="mx-5 text-lg text-slate-400 mt-5">
        Do tasks, discuss, vote; as a ghost, finish tasks to help a task win.
      </p>
      <div
        class="w-full flex flex-wrap sm:flex-nowrap items-center justify-stretch px-5 mt-7 gap-3"
      >
        <p class="w-1/6 text-white text-xs">Completed Tasks</p>
        <div class="w-full bg-indigo-950 rounded-full">
          <div class="w-1/3 rounded-full bg-cyan-300 py-1"></div>
        </div>
        <p class="w-1/6 text-white text-xl">43%</p>
      </div>
      <div
        class="w-full flex flex-wrap sm:flex-nowrap items-center justify-start mt-5 pb-10 px-5 gap-2"
      >
        <img
          class="w-14 h-14 rounded-full border border-slate-900 hover:scale-125 hover:border-pink-500 hover:border-2 duration-300 ease-in-out"
          src="https://i.redd.it/couldnt-find-many-pngs-of-the-among-us-characters-so-i-made-v0-an871k4o1sn51.png?width=440&format=png&auto=webp&s=7b903919d7b170f3550f5a8e4d4d2260d9a40dfe"
          alt=""
        />
        <img
          class="w-14 h-14 rounded-full border border-slate-900 hover:scale-125 hover:border-pink-500 hover:border-2 duration-300 ease-in-out"
          src="https://i.redd.it/couldnt-find-many-pngs-of-the-among-us-characters-so-i-made-v0-ph2jho4o1sn51.png?width=440&format=png&auto=webp&s=e9b1b9ff6f815f39ff5a7678438eee78daa7beca"
          alt=""
        />
        <img
          class="w-14 h-14 rounded-full border border-slate-900 hover:scale-125 hover:border-pink-500 hover:border-2 duration-300 ease-in-out"
          src="https://i.redd.it/couldnt-find-many-pngs-of-the-among-us-characters-so-i-made-v0-9kvk25sh2sn51.png?width=440&format=png&auto=webp&s=f3d25a2426def9e30ff1b276b094bfaa71fe113c"
          alt=""
        />
        <img
          class="w-14 h-14 rounded-full border border-slate-900 hover:scale-125 hover:border-pink-500 hover:border-2 duration-300 ease-in-out"
          src="https://i.redd.it/couldnt-find-many-pngs-of-the-among-us-characters-so-i-made-v0-xprpkp063sn51.png?width=440&format=png&auto=webp&s=03feeecb2afc4c6184679013ff93918d2dcdff2e"
          alt=""
        />
      </div>
    </div>
  </body>
</html>
