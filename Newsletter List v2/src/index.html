<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newsletter Preferences</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./input.css" />
  </head>
  <body class="min-h-screen overflow-x-hidden bg-[#f4efe6] text-slate-800">
    <div class="pointer-events-none fixed inset-0 -z-10">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="grain-layer"></div>
    </div>

    <main class="mx-auto w-full max-w-4xl px-4 py-10 sm:px-6 lg:py-14">
      <section
        class="reveal overflow-hidden rounded-[2rem] border border-[#ffffff99] bg-[#fffdf9d9] p-6 shadow-[0_24px_80px_-36px_rgba(12,41,64,0.6)] backdrop-blur md:p-10"
      >
        <div class="flex flex-wrap items-center justify-between gap-3">
          <span
            class="inline-flex items-center gap-2 rounded-full border border-[#13344926] bg-[#1334490f] px-3 py-1 text-xs font-semibold uppercase tracking-[0.16em] text-[#0b3a56]"
          >
            <i class="fa-solid fa-wand-magic-sparkles text-[10px]"></i>
            Weekly Picks
          </span>
          <span class="text-sm font-medium text-slate-500"
            >4 channels available</span
          >
        </div>

        <h1
          class="mt-5 text-balance text-3xl font-semibold leading-tight text-[#0f2233] sm:text-4xl [font-family:'Playfair_Display',serif]"
        >
          Curate your newsletter stream
        </h1>
        <p
          class="mt-3 max-w-2xl text-sm leading-relaxed text-slate-600 sm:text-base"
        >
          Select the stories you want in your inbox. You can update preferences
          anytime.
        </p>

        <ul class="mt-7 grid gap-3 sm:gap-4">
          <li class="reveal" style="animation-delay: 70ms">
            <label class="group block cursor-pointer">
              <input type="checkbox" class="peer sr-only" checked />
              <article
                class="flex items-start gap-4 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm transition duration-300 group-hover:-translate-y-1 group-hover:shadow-xl peer-checked:border-[#0b5c8a66] peer-checked:bg-[#f2f8fd]"
              >
                <img
                  class="h-20 w-24 rounded-xl object-cover transition duration-300 group-hover:scale-105"
                  src="https://media.istockphoto.com/id/525032572/photo/gambling-craps-game.jpg?s=612x612&w=0&k=20&c=ZAKkfyvjwiwbl-k3OCNY5B4naMZm7lKii_p4yp_whnc="
                  alt="Poker chips on a casino table"
                />
                <div class="min-w-0 flex-1">
                  <p class="text-base font-semibold text-slate-800">
                    Reverse The Online Gambling Ban
                  </p>
                  <p class="mt-1 text-sm leading-relaxed text-slate-500">
                    Policy updates, legal shifts, and market stories for the
                    gaming industry.
                  </p>
                </div>
                <span
                  class="mt-1 flex h-6 w-6 shrink-0 items-center justify-center rounded-md border-2 border-slate-300 text-xs text-transparent transition peer-checked:border-[#0b5c8a] peer-checked:bg-[#0b5c8a] peer-checked:text-white"
                >
                  <i class="fa-solid fa-check"></i>
                </span>
              </article>
            </label>
          </li>

          <li class="reveal" style="animation-delay: 140ms">
            <label class="group block cursor-pointer">
              <input type="checkbox" class="peer sr-only" />
              <article
                class="flex items-start gap-4 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm transition duration-300 group-hover:-translate-y-1 group-hover:shadow-xl peer-checked:border-[#0b5c8a66] peer-checked:bg-[#f2f8fd]"
              >
                <img
                  class="h-20 w-24 rounded-xl object-cover transition duration-300 group-hover:scale-105"
                  src="https://images.ctfassets.net/h6goo9gw1hh6/2sNZtFAWOdP1lmQ33VwRN3/24e953b920a9cd0ff2e1d587742a2472/1-intro-photo-final.jpg?w=1200&h=992&fl=progressive&q=70&fm=jpg"
                  alt="Desktop setup with social media screen"
                />
                <div class="min-w-0 flex-1">
                  <p class="text-base font-semibold text-slate-800">
                    Successful Myspace Profile
                  </p>
                  <p class="mt-1 text-sm leading-relaxed text-slate-500">
                    Audience growth ideas and creator strategies from web
                    culture archives.
                  </p>
                </div>
                <span
                  class="mt-1 flex h-6 w-6 shrink-0 items-center justify-center rounded-md border-2 border-slate-300 text-xs text-transparent transition peer-checked:border-[#0b5c8a] peer-checked:bg-[#0b5c8a] peer-checked:text-white"
                >
                  <i class="fa-solid fa-check"></i>
                </span>
              </article>
            </label>
          </li>

          <li class="reveal" style="animation-delay: 210ms">
            <label class="group block cursor-pointer">
              <input type="checkbox" class="peer sr-only" checked />
              <article
                class="flex items-start gap-4 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm transition duration-300 group-hover:-translate-y-1 group-hover:shadow-xl peer-checked:border-[#0b5c8a66] peer-checked:bg-[#f2f8fd]"
              >
                <img
                  class="h-20 w-24 rounded-xl object-cover transition duration-300 group-hover:scale-105"
                  src="https://cdn.thewirecutter.com/wp-content/media/2024/02/audiophileheadphones-2048px-0598.jpg?auto=webp&quality=75&width=1024"
                  alt="Over-ear studio headphones"
                />
                <div class="min-w-0 flex-1">
                  <p class="text-base font-semibold text-slate-800">
                    Home Audio Recording For Everyone
                  </p>
                  <p class="mt-1 text-sm leading-relaxed text-slate-500">
                    Studio workflows, beginner rigs, and practical recording
                    breakdowns.
                  </p>
                </div>
                <span
                  class="mt-1 flex h-6 w-6 shrink-0 items-center justify-center rounded-md border-2 border-slate-300 text-xs text-transparent transition peer-checked:border-[#0b5c8a] peer-checked:bg-[#0b5c8a] peer-checked:text-white"
                >
                  <i class="fa-solid fa-check"></i>
                </span>
              </article>
            </label>
          </li>

          <li class="reveal" style="animation-delay: 280ms">
            <label class="group block cursor-pointer">
              <input type="checkbox" class="peer sr-only" />
              <article
                class="flex items-start gap-4 rounded-2xl border border-slate-200 bg-white p-3 shadow-sm transition duration-300 group-hover:-translate-y-1 group-hover:shadow-xl peer-checked:border-[#0b5c8a66] peer-checked:bg-[#f2f8fd]"
              >
                <img
                  class="h-20 w-24 rounded-xl object-cover transition duration-300 group-hover:scale-105"
                  src="https://theproducthead.com/wp-content/uploads/2023/03/pexels-sarah-shi-14438772.jpg"
                  alt="Electronic testing gear on a workbench"
                />
                <div class="min-w-0 flex-1">
                  <p class="text-base font-semibold text-slate-800">
                    Buying Used Electronic Test Gear
                  </p>
                  <p class="mt-1 text-sm leading-relaxed text-slate-500">
                    How to inspect used equipment, avoid pitfalls, and buy with
                    confidence.
                  </p>
                </div>
                <span
                  class="mt-1 flex h-6 w-6 shrink-0 items-center justify-center rounded-md border-2 border-slate-300 text-xs text-transparent transition peer-checked:border-[#0b5c8a] peer-checked:bg-[#0b5c8a] peer-checked:text-white"
                >
                  <i class="fa-solid fa-check"></i>
                </span>
              </article>
            </label>
          </li>
        </ul>

        <form class="reveal mt-8" style="animation-delay: 350ms">
          <div class="flex flex-col gap-3 sm:flex-row">
            <label for="email" class="sr-only">Email address</label>
            <input
              type="email"
              name="email"
              id="email"
              class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 text-sm font-medium text-slate-700 outline-none ring-[#0b5c8a33] transition placeholder:text-slate-400 focus:border-[#0b5c8a99] focus:ring-4"
              placeholder="Enter your email"
              required
            />
            <button
              class="rounded-xl bg-[#0b5c8a] px-6 py-3 text-sm font-bold uppercase tracking-[0.08em] text-white shadow-[0_12px_25px_-12px_rgba(11,92,138,0.8)] transition duration-300 hover:-translate-y-0.5 hover:bg-[#0a4f77] hover:shadow-[0_18px_30px_-12px_rgba(11,92,138,0.65)]"
              type="submit"
            >
              Subscribe
            </button>
          </div>

          <p class="mt-4 text-xs leading-relaxed text-slate-500">
            Your privacy matters. Information shared through this form may be
            processed on servers outside the EU.
          </p>
        </form>
      </section>
    </main>
  </body>
</html>
