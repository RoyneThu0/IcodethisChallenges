<html lang="en">

    <meta charset="UTF-8" />

    <title>Cancel Form</title>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="w-screen h-screen flex items-center justify-center bg-cover bg-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1559765801-d0dbdb3b2366?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8YW1iZXJ8ZW58MHx8MHx8fDA%3D);
    "
  >
    <div
      class="w-11/12 max-w-2xl flex flex-col items-center justify-center bg-amber-300/60 rounded-lg hover:bg-amber-400 duration-300 p-5"
    >
      <p class="font-bold text-purple-500 text-3xl">Your account is closed</p>
      <p class="text-lg font-extralight mt-2">
        Could you spare a minute to tell us how we can improve?
      </p>
      <div
        class="w-full bg-amber-50 p-5 rounded-lg mt-4 shadow-2xl flex flex-col"
      >
        <form id="feedbackForm" class="flex flex-col">
          <p class="font-extralight text-slate-400">
            How likely is it that you would recommend us to your friends or
            colleagues?
          </p>
          <div class="grid md:grid-cols-12 grid-cols-5 gap-4 mt-7">
            <label
              for="rating-1"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-1"
                value="1"
                class="hidden peer"
                required
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                1
              </span>
            </label>
            <label
              for="rating-2"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-2"
                value="2"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                2
              </span>
            </label>
            <label
              for="rating-3"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-3"
                value="3"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                3
              </span>
            </label>
            <label
              for="rating-4"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-4"
                value="4"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                4
              </span>
            </label>
            <label
              for="rating-5"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-5"
                value="5"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                5
              </span>
            </label>
            <label
              for="rating-6"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-6"
                value="6"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                6
              </span>
            </label>
            <label
              for="rating-7"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-7"
                value="7"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                7
              </span>
            </label>
            <label
              for="rating-8"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-8"
                value="8"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                8
              </span>
            </label>
            <label
              for="rating-9"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-9"
                value="9"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                9
              </span>
            </label>
            <label
              for="rating-10"
              class="w-10 h-10 flex items-center justify-center bg-gray-100 peer-checked:text-white peer-checked:bg-[#e98513] rounded-md transition-all duration-200 hover:bg-[#e98513] hover:text-white cursor-pointer peer-checked:hover:bg-[#d97706] peer-checked:hover:scale-110"
            >
              <input
                type="radio"
                name="rating"
                id="rating-10"
                value="10"
                class="hidden peer"
              />
              <span
                class="inline-flex w-full h-full items-center justify-center rounded-md transition-all duration-200 peer-checked:bg-[#e98513] peer-checked:text-white"
              >
                10
              </span>
            </label>
          </div>
          <p class="w-full text-start mt-7 text-slate-400 font-extralight">
            How can we improve?
          </p>
          <textarea
            type="text"
            class="w-full border border-slate-400 rounded-lg mt-2 placeholder:text-slate-300 p-4 focus:border-[#e98513] focus:ring-2 focus:ring-[#e98513]/20 transition-all duration-200"
            placeholder="Type your text here"
            rows="4"
            id="message"
          ></textarea>
          <button
            type="submit"
            class="hidden w-full bg-[#e98513] text-white font-bold py-3 px-4 rounded-lg mt-4 hover:bg-[#d97706] transition-all duration-200 transform hover:scale-105 active:scale-95 shadow-lg"
            id="submitBtn"
          >
            Submit Feedback
          </button>
        </form>
      </div>
    </div>
    <script>
      const messageTextarea = document.getElementById("message");
      const submitBtn = document.getElementById("submitBtn");
      const feedbackForm = document.getElementById("feedbackForm");
      const container = document.querySelector(".w-11\\/12");

      messageTextarea.addEventListener("input", function () {
        if (this.value.trim().length > 0) {
          submitBtn.classList.remove("hidden");
        } else {
          submitBtn.classList.add("hidden");
        }
      });

      feedbackForm.addEventListener("submit", function (e) {
        e.preventDefault();

        // Simple validation
        const rating = document.querySelector('input[name="rating"]:checked');
        const message = messageTextarea.value.trim();

        if (!rating) {
          alert("Please select a rating.");
          return;
        }

        // Simulate submission
        container.innerHTML = `
          <div class="text-center animate-fade-in">
            <div class="text-6xl mb-4"><i class="fas fa-thumbs-up"></i></div>
            <p class="font-bold text-purple-500 text-3xl mb-2">Thank You!</p>
            <p class="text-lg font-extralight">Your feedback has been submitted successfully.</p>
            <p class="text-sm text-slate-400 mt-4">We appreciate your input and will use it to improve our service.</p>
          </div>
        `;

        // Trigger confetti
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 },
        });

        // Optional: Log the data
        console.log("Rating:", rating.value);
        console.log("Message:", message);
      });
    </script>
  </body>
</html>
