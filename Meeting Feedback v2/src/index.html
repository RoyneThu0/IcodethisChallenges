<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting feedback</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="w-screen h-screen flex items-center justify-center bg-sky-200 bg-cover bg-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1774893582522-c8e9c0aeaec9?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDkwfGJvOGpRS1RhRTBZfHxlbnwwfHx8fHw%3D);
    "
  >
    <div
      class="w-11/12 max-w-lg flex flex-col p-10 bg-white rounded-lg shadow-lg"
    >
      <div class="w-full flex items-center justify-end">
        <i
          class="fa-solid fa-xmark hover:text-blue-500 text-xl text-slate-400"
        ></i>
      </div>
      <h1 class="w-full text-center text-xl font-semibold font-serif">
        You left the meeting
      </h1>
      <div class="mt-5 rounded-lg bg-sky-400 w-full md:p-10 p-5 flex flex-col">
        <p class="w-full text-center text-white">
          How was the quality of the call?
        </p>
        <div
          id="stars"
          class="w-full flex items-center justify-center gap-5 mt-3 text-2xl flex-wrap"
        >
          <label>
            <input type="radio" name="rating" value="1" class="hidden" />
            <i
              class="fa-solid fa-star text-slate-300 duration-300 cursor-pointer"
            ></i>
          </label>
          <label>
            <input type="radio" name="rating" value="2" class="hidden" />
            <i
              class="fa-solid fa-star text-slate-300 duration-300 cursor-pointer"
            ></i>
          </label>
          <label>
            <input type="radio" name="rating" value="3" class="hidden" />
            <i
              class="fa-solid fa-star text-slate-300 duration-300 cursor-pointer"
            ></i>
          </label>
          <label>
            <input type="radio" name="rating" value="4" class="hidden" />
            <i
              class="fa-solid fa-star text-slate-300 duration-300 cursor-pointer"
            ></i>
          </label>
          <label>
            <input type="radio" name="rating" value="5" class="hidden" />
            <i
              class="fa-solid fa-star text-slate-300 duration-300 cursor-pointer"
            ></i>
          </label>
        </div>
        <div class="w-full flex items-center justify-between mt-4">
          <p class="text-sm text-slate-200">Very bad</p>
          <p class="text-sm text-slate-200">Excelente</p>
        </div>
      </div>
      <div class="w-full flex flex-col items-center justify-center mt-8 gap-3">
        <button
          class="bg-sky-500 px-9 py-3 rounded-md text-white hover:bg-blue-500 duration-300"
        >
          Return Home
        </button>
        <button
          class="px-12 py-3 rounded-md text-slate-700 hover:text-white hover:bg-blue-500 duration-300"
        >
          Join again
        </button>
      </div>
    </div>

    <script>
      const starsContainer = document.getElementById("stars");
      const labels = Array.from(starsContainer.querySelectorAll("label"));
      const inputs = Array.from(starsContainer.querySelectorAll("input"));

      function paintStars(upToIndex) {
        labels.forEach((label, i) => {
          const icon = label.querySelector("i");
          icon.classList.toggle("text-amber-400", i <= upToIndex);
          icon.classList.toggle("text-slate-300", i > upToIndex);
        });
      }

      function getSelectedIndex() {
        const checked = starsContainer.querySelector("input:checked");
        return checked ? inputs.indexOf(checked) : -1;
      }

      labels.forEach((label, index) => {
        label.addEventListener("mouseenter", () => paintStars(index));
        label.addEventListener("mouseleave", () =>
          paintStars(getSelectedIndex()),
        );
        label.addEventListener("click", () => {
          inputs[index].checked = true;
          paintStars(index);
        });
      });
    </script>
  </body>
</html>
