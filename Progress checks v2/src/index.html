          </div>
        </div>
      </div>
    </div>
    <script>
      const checkboxes = document.querySelectorAll('input[type="checkbox"]');
      const bars = document.querySelectorAll(".progress-bar");
      const counter = document.getElementById("progress-counter");
      const total = checkboxes.length;

      const barColors = [
        "#4a63ff",
        "#4a89f9",
        "#45a4f1",
        "#48c0f3",
        "#50d6f2",
        "#4cdad3",
        "#40debb",
        "#30e0a0",
        "#20e085",
      ];
      const darkColor = "#11162f";

      function updateProgress() {
        const checkedCount = [...checkboxes].filter((cb) => cb.checked).length;

        bars.forEach((bar, i) => {
          bar.style.backgroundColor =
            i < checkedCount ? barColors[i] : darkColor;
          bar.style.transition = "background-color 0.4s ease";
        });

        const remaining = total - checkedCount;
        counter.textContent =
          remaining === 0 ? "All complete!" : `${remaining} left to complete`;
      }

      checkboxes.forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          const checkIcon = checkbox.nextElementSibling;
          checkIcon.classList.toggle("opacity-0", !checkbox.checked);
          updateProgress();
        });
      });

      updateProgress();
    </script>
