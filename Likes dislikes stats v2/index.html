<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Likes Dislikes Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body
    class="min-h-screen w-full flex items-center justify-center bg-cover px-4 py-8"
    style="
      background-image: url(https://images.unsplash.com/photo-1734842349069-874282467700?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8M2QlMjByZW5kZXJzfGVufDB8MHwwfHx8MA%3D%3D);
    "
  >
    <div
      class="w-full max-w-3xl overflow-hidden rounded-2xl border border-slate-200/80 bg-white/95 shadow-2xl shadow-slate-700/25 backdrop-blur-sm"
    >
      <div
        class="bg-gradient-to-r from-indigo-500 via-sky-500 to-rose-400 px-6 py-4"
      ></div>

      <div class="px-6 py-8 sm:px-8 md:px-10">
        <img
          class="mx-auto mb-4 h-24 w-24 rounded-full border-4 border-slate-100 object-cover shadow-md sm:h-28 sm:w-28"
          src="https://t4.ftcdn.net/jpg/14/83/92/87/360_F_1483928786_vfoK3BHfG0fqmx1m8IiKp5mDJxv9SZIw.jpg"
          alt="User avatar"
        />
        <p class="w-full text-center text-xl font-semibold text-slate-800">
          Likes vs. Dislikes
        </p>
        <p class="mb-6 w-full text-center text-sm text-slate-500">
          Past 7 days
        </p>

        <div class="rounded-xl bg-slate-50 p-3 shadow-inner sm:p-4">
          <div class="chart-container h-72 sm:h-80">
            <canvas id="likesDislikesChart"></canvas>
          </div>
        </div>

        <div class="mt-6 flex justify-center">
          <button
            class="rounded-full border border-indigo-600 px-6 py-2.5 text-sm font-medium text-indigo-600 transition hover:bg-indigo-600 hover:text-white hover:shadow-lg"
          >
            View Details
          </button>
        </div>
      </div>
    </div>

    <script>
      const ctx = document
        .getElementById("likesDislikesChart")
        .getContext("2d");
      const likesDislikesChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
          datasets: [
            {
              label: "Likes",
              data: [200, 150, 250, 180, 270, 220, 180],
              backgroundColor: "#3B82F6",
              borderRadius: 6,
            },
            {
              label: "Dislikes",
              data: [120, 170, 200, 160, 230, 140, 210],
              backgroundColor: "#EF4444",
              borderRadius: 6,
            },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                color: "#6B7280",
              },
              grid: {
                color: "#E5E7EB",
              },
            },
            x: {
              ticks: {
                color: "#6B7280",
              },
              grid: {
                color: "#E5E7EB",
              },
            },
          },
          plugins: {
            legend: {
              position: "top",
              labels: {
                color: "#4B5563",
                boxWidth: 12,
                padding: 14,
              },
            },
          },
        },
      });
    </script>
  </body>
</html>
