<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notification Cards</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
    <style>
      :root {
        --bg-1: #fdfbf6;
        --bg-2: #f2f7ff;
        --panel: rgba(255, 255, 255, 0.78);
        --ink: #1f2a44;
      }

      body {
        font-family: "Sora", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at 0% 0%,
            rgba(76, 227, 172, 0.26) 0%,
            transparent 42%
          ),
          radial-gradient(
            circle at 100% 100%,
            rgba(61, 131, 245, 0.18) 0%,
            transparent 45%
          ),
          linear-gradient(135deg, var(--bg-1), var(--bg-2));
      }

      .bg-blob {
        position: fixed;
        border-radius: 999px;
        filter: blur(20px);
        opacity: 0.42;
        pointer-events: none;
        z-index: 0;
        will-change: transform;
      }

      .blob-one {
        width: min(44vw, 520px);
        height: min(44vw, 520px);
        left: -12vw;
        top: -8vh;
        background: radial-gradient(circle at 30% 30%, #68e1af, #4aa2ff);
        animation: drift-a 16s ease-in-out infinite alternate;
      }

      .blob-two {
        width: min(36vw, 440px);
        height: min(36vw, 440px);
        right: -10vw;
        top: 22vh;
        background: radial-gradient(circle at 35% 35%, #ff9dbe, #ffa559);
        animation: drift-b 19s ease-in-out infinite alternate;
      }

      .blob-three {
        width: min(40vw, 500px);
        height: min(40vw, 500px);
        left: 26vw;
        bottom: -22vh;
        background: radial-gradient(circle at 40% 40%, #9ca7ff, #69d5ff);
        animation: drift-c 18s ease-in-out infinite alternate;
      }

      .notification-card {
        backdrop-filter: blur(14px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 18px 45px rgba(31, 42, 68, 0.14);
        animation: float-in 650ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
      }

      .notification-card:nth-child(2) {
        animation-delay: 130ms;
      }

      .dismiss {
        transition:
          transform 180ms ease,
          background-color 180ms ease;
      }

      .dismiss:hover {
        transform: rotate(90deg) scale(1.03);
        background-color: rgba(229, 231, 235, 0.9);
      }

      @keyframes float-in {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes drift-a {
        0% {
          transform: translate3d(0, 0, 0) scale(1);
        }

        50% {
          transform: translate3d(9vw, 10vh, 0) scale(1.08);
        }

        100% {
          transform: translate3d(2vw, 17vh, 0) scale(0.96);
        }
      }

      @keyframes drift-b {
        0% {
          transform: translate3d(0, 0, 0) scale(1);
        }

        50% {
          transform: translate3d(-10vw, -7vh, 0) scale(1.06);
        }

        100% {
          transform: translate3d(-4vw, 8vh, 0) scale(0.95);
        }
      }

      @keyframes drift-c {
        0% {
          transform: translate3d(0, 0, 0) scale(1);
        }

        50% {
          transform: translate3d(-8vw, -10vh, 0) scale(1.07);
        }

        100% {
          transform: translate3d(7vw, -4vh, 0) scale(0.94);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .bg-blob,
        .notification-card {
          animation: none;
        }
      }
    </style>
  </head>
  <body
    class="w-screen min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-10"
  >
    <div class="bg-blob blob-one"></div>
    <div class="bg-blob blob-two"></div>
    <div class="bg-blob blob-three"></div>

    <div class="relative z-10 flex flex-col w-full max-w-3xl gap-5 sm:gap-6">
      <div
        class="notification-card relative isolate overflow-hidden w-full rounded-3xl bg-[var(--panel)] flex flex-col p-5 sm:p-7"
      >
        <div class="flex justify-end">
          <i
            class="dismiss fa-solid fa-xmark bg-gray-200/80 rounded-full py-3 px-[14px] text-gray-600 cursor-pointer"
          ></i>
        </div>
        <div class="flex z-10 items-start justify-start gap-1.5 sm:gap-3">
          <div class="">
            <img
              src="https://static.vecteezy.com/system/resources/previews/034/794/812/non_2x/gradient-bright-green-rounded-square-check-mark-shiny-button-3d-free-png.png"
              alt=""
              class="w-20 sm:w-24"
            />
          </div>
          <div
            class="w-full flex flex-col mb-10 items-start justify-start mt-2"
          >
            <p class="font-semibold text-lg sm:text-2xl text-slate-800">
              Thank you for subscribing!
            </p>
            <p class="text-sm sm:text-base text-slate-600 leading-relaxed">
              You will recieve an email to confirm your subscription.
            </p>
          </div>
        </div>
        <div
          class="absolute -left-28 -top-5 z-5 rounded-full w-52 h-52 bg-emerald-300/55 blur-sm"
        ></div>
      </div>
      <div
        class="notification-card relative isolate overflow-hidden w-full rounded-3xl bg-[var(--panel)] flex flex-col p-5 sm:p-7"
      >
        <div class="flex justify-end">
          <i
            class="dismiss fa-solid fa-xmark bg-gray-200/80 rounded-full py-3 px-[14px] text-gray-600 cursor-pointer"
          ></i>
        </div>
        <div class="flex z-10 items-start justify-start gap-1.5 sm:gap-3">
          <div class="">
            <img
              src="https://freesvg.org/img/Red-X-Icon.png"
              alt=""
              class="w-20 sm:w-24"
            />
          </div>
          <div
            class="w-full ml-2 flex flex-col mb-10 items-start justify-start mt-2"
          >
            <p class="font-semibold text-lg sm:text-2xl text-slate-800">
              Oops! an error occured.
            </p>
            <p class="text-sm sm:text-base text-slate-600 leading-relaxed">
              Apologies for the inconvenience. Please try again.
            </p>
          </div>
        </div>
        <div
          class="absolute -left-28 -top-5 z-5 rounded-full w-52 h-52 bg-rose-300/55 blur-sm"
        ></div>
      </div>
    </div>
  </body>
</html>
