<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search Suggestions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: radial-gradient(
          circle at top left,
          #f8fbff 0%,
          #e7ecf3 45%,
          #dde4ee 100%
        );
      }

      .neo-panel {
        background: #e7ecf3;
        box-shadow:
          18px 18px 36px rgba(163, 177, 198, 0.52),
          -18px -18px 36px rgba(255, 255, 255, 0.95);
      }

      .neo-inset {
        background: #e7ecf3;
        box-shadow:
          inset 10px 10px 20px rgba(163, 177, 198, 0.4),
          inset -10px -10px 20px rgba(255, 255, 255, 0.95);
      }

      .neo-button {
        background: linear-gradient(145deg, #eef3fa, #d8dfe8);
        box-shadow:
          10px 10px 18px rgba(163, 177, 198, 0.45),
          -10px -10px 18px rgba(255, 255, 255, 0.96);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          color 180ms ease;
      }

      .neo-button:hover {
        transform: translateY(-1px);
        box-shadow:
          12px 12px 22px rgba(163, 177, 198, 0.48),
          -12px -12px 22px rgba(255, 255, 255, 0.98);
      }

      .neo-button:active {
        transform: translateY(0);
        box-shadow:
          inset 8px 8px 16px rgba(163, 177, 198, 0.38),
          inset -8px -8px 16px rgba(255, 255, 255, 0.9);
      }

      .neo-item {
        background: linear-gradient(145deg, #edf2f8, #dbe2eb);
        box-shadow:
          8px 8px 18px rgba(163, 177, 198, 0.3),
          -8px -8px 18px rgba(255, 255, 255, 0.8);
      }

      .neo-item:hover {
        box-shadow:
          inset 6px 6px 12px rgba(163, 177, 198, 0.2),
          inset -6px -6px 12px rgba(255, 255, 255, 0.82);
      }

      .hide-scrollbar::-webkit-scrollbar {
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body class="w-screen min-h-screen flex items-center justify-center px-4">
    <div class="w-full min-h-screen flex items-center justify-center">
      <div class="neo-panel w-full max-w-xl rounded-[2rem] p-5 sm:p-7">
        <div class="mb-5 px-1">
          <p
            class="text-xs font-bold uppercase tracking-[0.35em] text-slate-500"
          >
            Browse Fruits
          </p>
        </div>

        <div class="flex items-center gap-3">
          <div class="relative w-full">
            <input
              type="text"
              id="search"
              class="neo-inset w-full rounded-[1.5rem] border-none bg-transparent px-5 py-4 text-base text-slate-700 placeholder:text-slate-400 focus:outline-none"
              placeholder="Search fruits..."
              oninput="showSuggestions(this.value)"
            />
            <ul
              id="suggestions"
              class="neo-panel hide-scrollbar absolute left-0 right-0 top-[calc(100%+1rem)] rounded-[1.5rem] p-3 max-h-72 overflow-y-auto hidden"
            ></ul>
          </div>
          <button
            type="button"
            aria-label="Search"
            class="neo-button flex h-14 w-14 shrink-0 items-center justify-center rounded-2xl text-slate-500"
          >
            <i class="fa-solid fa-magnifying-glass text-lg"></i>
          </button>
        </div>
      </div>
    </div>

    <script>

        },
        {

        },
        {

        },

        },
        {
          name: "Yuzu",
          img: "https://produits.bienmanger.com/29603-0w470h470_Fresh_Yuzu.jpg",
        },
        {
          name: "Zante Currant",
          img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRPXJJF-GiJhvjEHVV_9-Msxfgn7fqDY_nGfAlVYBNCxdxvazEBmM3M1SYClLlYdUBU-Os&usqp=CAU",
        },
      ];

      function showSuggestions(value) {
        const suggestionBox = document.getElementById("suggestions");
        suggestionBox.innerHTML = "";
        if (value) {
          const filteredSuggestions = suggestions.filter((suggestion) =>
            suggestion.name.toLowerCase().includes(value.toLowerCase()),
          );
          filteredSuggestions.forEach((suggestion) => {
            const li = document.createElement("li");
            li.className =
              "neo-item mb-3 flex cursor-pointer items-center gap-4 rounded-[1.25rem] p-3 text-slate-600 last:mb-0";
            li.innerHTML = `<img src="${suggestion.img}" alt="${suggestion.name}" class="h-14 w-14 rounded-2xl object-cover"/><div><p class="text-sm font-semibold text-slate-700">${suggestion.name}</p><p class="text-xs text-slate-400">Fresh and ready to explore</p></div>`;
            suggestionBox.appendChild(li);
          });
          suggestionBox.classList.remove("hidden");
        } else {
          suggestionBox.classList.add("hidden");
        }
      }
    </script>
  </body>
</html>
