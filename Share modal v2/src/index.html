<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Share Modal</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body
    class="w-screen h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 bg-cover bg-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1772984709954-9cb78998e3d2?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
      background-blend-mode: overlay;
    "
  >
    <button
      id="reopenBtn"
      class="fixed bottom-8 right-8 px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-400 hover:to-pink-400 text-white font-medium rounded-lg shadow-lg opacity-0 invisible transition-all duration-300 hover:shadow-xl hover:scale-105 transform"
    >
      Share Article
    </button>
    <div
      id="modalOverlay"
      class="fixed inset-0 bg-black/30 backdrop-blur-sm opacity-100 visible transition-all duration-300"
    ></div>

    <div
      id="modalContainer"
      class="fixed inset-0 flex items-center justify-center pointer-events-none"
    >
      <div
        id="modal"
        class="w-11/12 max-w-lg p-8 bg-gradient-to-br from-slate-800 via-slate-800 to-slate-900 rounded-2xl shadow-2xl flex flex-col border border-purple-500/20 opacity-100 scale-100 transition-all duration-300 pointer-events-auto"
      >
        <div class="flex items-center justify-end mb-2">
          <button
            class="text-gray-300 hover:text-white transition-colors duration-200 group"
          >
            <i
              class="fa-solid fa-xmark text-2xl group-hover:scale-110 transition-transform duration-200"
            ></i>
          </button>
        </div>
        <p
          class="w-full text-2xl text-center text-white font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent"
        >
          Share this article
        </p>
        <p
          class="w-full text-sm text-center text-gray-300 mt-4 leading-relaxed"
        >
          If you liked this article share it with your friends. <br />They will
          <span class="text-purple-400 font-medium">thank you later</span>.
        </p>
        <div class="grid md:grid-cols-3 grid-cols-1 gap-4 mt-8">
          <div
            class="group flex items-center justify-center bg-gradient-to-br from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 duration-300 hover:shadow-lg hover:shadow-blue-500/50 p-4 rounded-xl gap-3 cursor-pointer transform hover:scale-105 transition-all"
          >
            <i
              class="fa-brands fa-facebook-f text-white text-lg group-hover:scale-125 transition-transform"
            ></i>
            <p class="text-white font-medium">Facebook</p>
          </div>
          <div
            class="group flex items-center justify-center bg-gradient-to-br from-sky-400 to-sky-500 hover:from-sky-300 hover:to-sky-400 duration-300 hover:shadow-lg hover:shadow-sky-400/50 p-4 rounded-xl gap-3 cursor-pointer transform hover:scale-105 transition-all"
          >
            <i
              class="fa-brands fa-twitter text-white text-lg group-hover:scale-125 transition-transform"
            ></i>
            <p class="text-white font-medium">Twitter</p>
          </div>
          <div
            class="group flex items-center justify-center bg-gradient-to-br from-orange-600 to-red-600 hover:from-orange-500 hover:to-red-500 duration-300 hover:shadow-lg hover:shadow-orange-500/50 p-4 rounded-xl gap-3 cursor-pointer transform hover:scale-105 transition-all"
          >
            <i
              class="fa-brands fa-reddit text-white text-lg group-hover:scale-125 transition-transform"
            ></i>
            <p class="text-white font-medium">Reddit</p>
          </div>
        </div>
        <p class="text-center text-white mt-6 font-semibold">
          <span
            class="text-2xl bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent"
            >4.5K</span
          >
          <span class="text-gray-400 text-sm">Shares</span>
        </p>
        <button
          class="text-center text-transparent bg-gradient-to-r from-amber-300 to-orange-400 bg-clip-text mt-5 text-sm font-medium hover:text-white hover:bg-gradient-to-r hover:from-pink-500 hover:to-orange-500 transition-all duration-300 cursor-pointer hover:scale-105 transform"
        >
          Close this window
        </button>
      </div>
    </div>

    <script>
      const modal = document.getElementById("modal");
      const modalOverlay = document.getElementById("modalOverlay");
      const modalContainer = document.getElementById("modalContainer");
      const closeBtn = document.querySelector("button.group");
      const reopenBtn = document.getElementById("reopenBtn");

      function closeModal() {
        modal.classList.remove("opacity-100", "scale-100");
        modal.classList.add("opacity-0", "scale-95");
        modalOverlay.classList.remove("opacity-100", "visible");
        modalOverlay.classList.add("opacity-0", "invisible");

        setTimeout(() => {
          modalContainer.style.display = "none";
          reopenBtn.classList.remove("opacity-0", "invisible");
          reopenBtn.classList.add("opacity-100", "visible");
        }, 300);
      }

      function openModal() {
        modalContainer.style.display = "flex";
        reopenBtn.classList.remove("opacity-100", "visible");
        reopenBtn.classList.add("opacity-0", "invisible");

        setTimeout(() => {
          modal.classList.remove("opacity-0", "scale-95");
          modal.classList.add("opacity-100", "scale-100");
          modalOverlay.classList.remove("opacity-0", "invisible");
          modalOverlay.classList.add("opacity-100", "visible");
        }, 10);
      }

      closeBtn.addEventListener("click", closeModal);

      reopenBtn.addEventListener("click", openModal);

      modalOverlay.addEventListener("click", closeModal);
    </script>
  </body>
</html>
