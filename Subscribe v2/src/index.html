<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscribe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body
    class="w-screen min-h-screen bg-slate-100 flex items-center justify-center bg-cover bg-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1501696461415-6bd6660c6742?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mzd8fDRrJTIwd2FsbHBhcGVyfGVufDB8MHwwfHx8MA%3D%3D);
    "
  >
    <div
      class="w-11/12 max-w-3xl p-10 bg-white flex flex-col items-center justify-center shadow-2xl rounded-lg"
    >
      <div
        id="subscribe-view"
        class="w-full flex flex-col items-center justify-center"
      >
        <p class="font-bold text-xl">Let's Keep in touch</p>
        <p class="mt-5">
          Subscribe to keep up with fresh news and exciting updates
        </p>
        <p>We promise not to spam you!</p>
        <div
          class="sm:flex grid md:grid-cols-2 grid-cols-1 items-center justify-center w-full mt-7 gap-2"
        >
          <input
            type="email"
            name=""
            id="email"
            class="border border-slate-300 w-full py-4 px-2 pr-20"
            placeholder="Enter your email address"
          />
          <button
            id="send-btn"
            class="py-4 bg-sky-500 text-white w-full md:w-1/3 shadow-md hover:shadow-none shadow-sky-400 rounded-md hover:bg-blue-600 active:bg-purple-400"
          >
            SEND<i class="fa-solid fa-arrow-right mx-2"></i>
          </button>
        </div>
        <div
          class="flex items-start md:justify-start justify-center w-full mt-10 sm:space-x-2"
        >
          <input type="checkbox" name="check" id="check" class="w-5 h-5" />
          <label for="check" class="ml-2 w-full"
            >I agree to my email address being stored and <br />
            used to recieve the monthly newsletter</label
          >
        </div>
      </div>

      <div
        id="success-view"
        class="hidden w-full flex-col items-center justify-center text-center"
      >
        <div
          class="h-16 w-16 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center"
        >
          <i class="fa-solid fa-check text-2xl"></i>
        </div>
        <p class="font-bold text-2xl mt-6">I'll be in touch</p>
        <p class="mt-3 text-slate-600">
          Thanks for subscribing. Keep an eye on your inbox for updates.
        </p>
      </div>
    </div>

    <script>
      const sendButton = document.getElementById("send-btn");
      const subscribeView = document.getElementById("subscribe-view");
      const successView = document.getElementById("success-view");

      sendButton.addEventListener("click", () => {
        subscribeView.classList.add("hidden");
        successView.classList.remove("hidden");
        successView.classList.add("flex");
      });
    </script>
  </body>
</html>
