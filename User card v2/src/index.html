<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Card v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
  </head>
  <body
    class="w-screen min-h-screen flex items-center justify-center bg-cover bg-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1634655377962-e6e7b446e7e9?q=80&w=1664&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    "
  >
    <div
      class="w-11/12 max-w-sm p-10 bg-white rounded-lg shadow-xl sm:flex grid grid-cols-1 md:grid-cols-2 gap-3"
    >
      <div class="md:w-1/3 flex items-start justify-center md:justify-end">
        <div
          class="w-16 h-16 rounded-full hover:scale-110 hover:border-sky-500 duration-300 ease-in-out transition-transform bg-white border-4 border-gray-200"
        >
          <img
            src="https://images.unsplash.com/photo-1755603181706-0637350219b4?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTA0fHxwZW9wbGV8ZW58MHwyfDB8fHww"
            alt=""
            class="object-cover rounded-full w-full h-full"
          />
        </div>
      </div>
      <div class="md:w-2/3">
        <h1 class="font-serif text-lg md:text-start text-center font-semibold">
          David Grant
        </h1>
        <p class="text-sm text-gray-600 md:text-start text-center">3D artist</p>

        <ul
          class="mt-3 w-full flex md:items-start items-center justify-center flex-col gap-1"
        >
          <li
            class="bg-blue-200 flex items-center justify-center gap-2 text-xs"
          >
            <i class="fa-regular fa-star"></i>
            <p class="w-full text-start">4.7 rating</p>
          </li>
          <li class="flex items-center justify-center gap-2 text-xs text-start">
            <i class="fa-solid fa-award"></i>
            <p class="w-full text-start">4,447 reviews</p>
          </li>
          <li class="flex items-center justify-center gap-2 text-xs text-start">
            <i class="fa-regular fa-user"></i>
            <p class="w-full text-start">478 students</p>
          </li>
        </ul>
        <p class="text-xs text-gray-600 mt-3">
          David grant has been making video games for a living for more than 14
          years as a designer,Producer, Creative producer, Creative director and
          Excexutive producer, creating games for mobile, PC and Facebook.
        </p>

        <div class="mt-5 flex md:justify-start justify-center">
          <button
            class="border border-gray-400 rounded-sm text-xs px-2 py-1 hover:bg-gray-400 hover:text-white duration-300 ease-in-out"
          >
            Show more
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
