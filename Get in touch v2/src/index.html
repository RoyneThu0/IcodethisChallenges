<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get In touch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
      };
    </script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
  </head>
  <body
    class="w-screen h-screen bg-gradient-to-br from-slate-100 via-slate-50 to-blue-100 dark:from-slate-950 dark:via-slate-900 dark:to-blue-950 flex flex-col items-center justify-center transition-colors duration-500 font-sans p-4"
  >
    <div
      class="relative w-full max-w-sm sm:max-w-md p-8 pt-10 bg-white/90 dark:bg-slate-800/90 backdrop-blur-xl rounded-3xl shadow-2xl shadow-slate-300/60 dark:shadow-black/50 flex flex-col items-center text-center transition-all duration-500"
    >
      <div class="absolute top-4 right-4 flex items-center justify-center">
        <i
          class="fa-solid fa-xmark text-slate-400 dark:text-slate-500 text-lg hover:text-slate-700 dark:hover:text-slate-200 hover:rotate-90 transition-all duration-300 cursor-pointer p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700/50 flex items-center justify-center w-8 h-8"
        ></i>
      </div>

      <div
        class="inline-flex items-center justify-center bg-slate-100 dark:bg-slate-700/50 px-4 py-1.5 rounded-full mb-6 shadow-sm transition-colors duration-300"
      >
        <p class="text-xs font-medium text-slate-600 dark:text-slate-300">
          Created with
          <i class="fa-solid fa-heart text-rose-500 mx-0.5 animate-pulse"></i>
          by
          <span class="text-amber-500 font-semibold">FlorinPop</span>
        </p>
      </div>

      <p
        class="text-xs font-bold tracking-widest text-slate-400 dark:text-slate-400 uppercase mb-6"
      >
        GET IN TOUCH ON
      </p>

      <div class="flex w-full justify-center items-center flex-wrap gap-4 mb-2">
        <div
          class="group w-14 h-14 rounded-full p-[2px] bg-slate-200 dark:bg-slate-700 hover:bg-gradient-to-tr hover:from-sky-400 hover:to-blue-500 transition-all duration-300 shadow-sm hover:shadow-lg hover:shadow-sky-500/30 hover:-translate-y-1 cursor-pointer"
        >
          <div
            class="w-full h-full rounded-full bg-white dark:bg-slate-800 flex items-center justify-center transition-colors duration-300 group-hover:bg-sky-500 dark:group-hover:bg-sky-500"
          >
            <i
              class="fa-brands fa-twitter text-xl text-slate-600 dark:text-slate-300 group-hover:text-white transition-colors duration-300"
            ></i>
          </div>
        </div>

        <div
          class="group w-14 h-14 rounded-full p-[2px] bg-slate-200 dark:bg-slate-700 hover:bg-gradient-to-tr hover:from-amber-400 hover:via-rose-500 hover:to-purple-600 transition-all duration-300 shadow-sm hover:shadow-lg hover:shadow-rose-500/30 hover:-translate-y-1 cursor-pointer"
        >
          <div
            class="w-full h-full rounded-full bg-white dark:bg-slate-800 flex items-center justify-center transition-colors duration-300 group-hover:bg-gradient-to-tr group-hover:from-amber-500 group-hover:via-rose-500 group-hover:to-purple-600"
          >
            <i
              class="fa-brands fa-instagram text-xl text-slate-600 dark:text-slate-300 group-hover:text-white transition-colors duration-300"
            ></i>
          </div>
        </div>

        <div
          class="group w-14 h-14 rounded-full p-[2px] bg-slate-200 dark:bg-slate-700 hover:bg-gradient-to-tr hover:from-blue-500 hover:to-indigo-600 transition-all duration-300 shadow-sm hover:shadow-lg hover:shadow-blue-500/30 hover:-translate-y-1 cursor-pointer"
        >
          <div
            class="w-full h-full rounded-full bg-white dark:bg-slate-800 flex items-center justify-center transition-colors duration-300 group-hover:bg-blue-600 dark:group-hover:bg-blue-600"
          >
            <i
              class="fa-brands fa-facebook text-xl text-slate-600 dark:text-slate-300 group-hover:text-white transition-colors duration-300"
            ></i>
          </div>
        </div>

        <div
          class="group w-14 h-14 rounded-full p-[2px] bg-slate-200 dark:bg-slate-700 hover:bg-gradient-to-tr hover:from-sky-500 hover:to-blue-700 transition-all duration-300 shadow-sm hover:shadow-lg hover:shadow-blue-600/30 hover:-translate-y-1 cursor-pointer"
        >
          <div
            class="w-full h-full rounded-full bg-white dark:bg-slate-800 flex items-center justify-center transition-colors duration-300 group-hover:bg-blue-700 dark:group-hover:bg-blue-700"
          >
            <i
              class="fa-brands fa-linkedin text-xl text-slate-600 dark:text-slate-300 group-hover:text-white transition-colors duration-300"
            ></i>
          </div>
        </div>
      </div>
    </div>

    <div class="mt-8 flex justify-center">
      <button
        id="toggleTheme"
        class="group flex items-center gap-2.5 px-6 py-3 rounded-full bg-white/90 dark:bg-slate-800/90 backdrop-blur-md shadow-lg shadow-slate-900/5 dark:shadow-black/30 text-slate-700 dark:text-slate-200 font-medium text-sm hover:bg-white dark:hover:bg-slate-700 hover:shadow-xl transition-all duration-300 active:scale-95 cursor-pointer"
      >
        <i
          id="themeIcon"
          class="fa-solid fa-moon text-indigo-500 transition-transform duration-300 group-hover:-rotate-12"
        ></i>
        <span id="buttonText">Dark Mode</span>
      </button>
    </div>

    <script>
      // Wait for DOM to be fully loaded
      document.addEventListener("DOMContentLoaded", function () {
        const toggleButton = document.getElementById("toggleTheme");
        const buttonText = document.getElementById("buttonText");
        const themeIcon = document.getElementById("themeIcon");
        const html = document.documentElement;

        // Check for saved theme preference or default to light mode
        const currentTheme = localStorage.getItem("theme") || "light";

        function applyTheme(theme) {
          if (theme === "dark") {
            html.classList.add("dark");
            buttonText.textContent = "Light Mode";
            if (themeIcon) {
              themeIcon.className =
                "fa-solid fa-sun text-amber-500 transition-transform duration-300 group-hover:rotate-45";
            }
          } else {
            html.classList.remove("dark");
            buttonText.textContent = "Dark Mode";
            if (themeIcon) {
              themeIcon.className =
                "fa-solid fa-moon text-indigo-500 transition-transform duration-300 group-hover:-rotate-12";
            }
          }
        }

        // Apply initial theme
        applyTheme(currentTheme);

        toggleButton.addEventListener("click", () => {
          const isDark = html.classList.contains("dark");

          if (isDark) {
            html.classList.remove("dark");
            localStorage.setItem("theme", "light");
            buttonText.textContent = "Dark Mode";
            if (themeIcon) {
              themeIcon.className =
                "fa-solid fa-moon text-indigo-500 transition-transform duration-300 group-hover:-rotate-12";
            }
          } else {
            html.classList.add("dark");
            localStorage.setItem("theme", "dark");
            buttonText.textContent = "Light Mode";
            if (themeIcon) {
              themeIcon.className =
                "fa-solid fa-sun text-amber-500 transition-transform duration-300 group-hover:rotate-45";
            }
          }
        });
      });
    </script>
  </body>
</html>
