<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather — Refined</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body
    class="w-screen h-screen bg-cover flex items-center justify-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1768956463493-a8118a41b629?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHx0b3BpYy1mZWVkfDY0fGlVSXNuVnRqQjBZfHxlbnwwfHx8fHw%3D);
      font-family: &quot;Inter&quot;, sans-serif;
    "
  >
    <main
      class="relative z-0 w-11/12 max-w-sm bg-white/5 backdrop-blur-sm rounded-xl shadow-2xl overflow-hidden"
    >
      <img
        class="w-full h-44 object-cover blur-sm"
        src="https://burst.shopifycdn.com/photos/london-uk.jpg?width=1000&format=pjpg&exif=0&iptc=0"
        alt="London skyline"
      />

      <div
        class="absolute top-0 left-0 w-full h-44 flex flex-col items-center justify-center bg-gradient-to-t from-black/40 via-transparent to-transparent text-white"
      >
        <p class="text-2xl font-semibold drop-shadow-md">London</p>
        <div class="mt-3 flex flex-col items-center">
          <p
            class="text-6xl text-gray-400 font-extrabold leading-none drop-shadow-lg"
          >
            23º
          </p>
          <p class="text-base text-sky-200">Cloudy</p>
        </div>
      </div>

      <section class="p-4 bg-white/40 backdrop-blur-sm space-y-3">
        <h2 class="sr-only">5 day forecast</h2>
        <ul class="space-y-2">
          <li class="flex items-center justify-between px-3">
            <span class="font-medium text-slate-700">Sunday</span>
            <div class="flex items-center gap-3">
              <span class="font-bold text-slate-800">18º</span>
              <i
                class="fa-solid fa-cloud text-slate-600 text-2xl"
                aria-hidden="true"
              ></i>
            </div>
          </li>
          <li class="flex items-center justify-between px-3">
            <span class="font-medium text-slate-700">Monday</span>
            <div class="flex items-center gap-3">
              <span class="font-bold text-slate-800">20º</span>
              <i
                class="fa-solid fa-cloud-sun-rain text-slate-600 text-2xl"
                aria-hidden="true"
              ></i>
            </div>
          </li>
          <li class="flex items-center justify-between px-3">
            <span class="font-medium text-slate-700">Tuesday</span>
            <div class="flex items-center gap-3">
              <span class="font-bold text-slate-800">14º</span>
              <i
                class="fa-solid fa-cloud-sun text-slate-600 text-2xl"
                aria-hidden="true"
              ></i>
            </div>
          </li>
          <li class="flex items-center justify-between px-3">
            <span class="font-medium text-slate-700">Wednesday</span>
            <div class="flex items-center gap-3">
              <span class="font-bold text-slate-800">16º</span>
              <i
                class="fa-solid fa-cloud-meatball text-slate-600 text-2xl"
                aria-hidden="true"
              ></i>
            </div>
          </li>
          <li class="flex items-center justify-between px-3">
            <span class="font-medium text-slate-700">Thursday</span>
            <div class="flex items-center gap-3">
              <span class="font-bold text-slate-800">19º</span>
              <i
                class="fa-solid fa-cloud-moon-rain text-slate-600 text-2xl"
                aria-hidden="true"
              ></i>
            </div>
          </li>
        </ul>
      </section>

      <footer class="px-4 py-4 bg-white flex items-center justify-center">
        <button
          class="flex items-center gap-2 bg-sky-500 hover:bg-sky-600 text-white px-4 py-2 rounded-md shadow-md"
        >
          <i class="fa-solid fa-plus"></i>
          <span>Add location</span>
        </button>
      </footer>
    </main>
  </body>
</html>
