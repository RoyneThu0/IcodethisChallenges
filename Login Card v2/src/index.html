<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="w-screen h-screen flex items-center justify-center bg-[#f9eff0]">
    <div class="relative w-11/12 max-w-3xl">
      <div
        id="loginCard"
        class="relative w-full h-[500px] bg-white rounded-lg shadow-lg shadow-gray-400 flex items-center justify-center transition duration-500"
      >
        <div class="w-full h-f flex flex-col p-10">
          <p class="text-2xl font-bold">Log In</p>
          <p class="mt-3 text-xs">
            Log into your account to upload or download pictures videos or
            music.
          </p>

          <input
            type="email"
            name="email"
            class="w-full px-3 focus:outline-none py-4 mt-9 border-2 border-gray-300 rounded-lg text-sm transition"
            placeholder="Enter your email address"
            id="emailInput"
            autocomplete="email"
          />
          <p id="emailHint" class="mt-2 text-xs text-slate-400">
            Enter a valid email to continue.
          </p>

          <div
            class="grid sm:grid-cols-2 grid-cols-1 items-center justify-between px-5 mt-5"
          >
            <p
              id="forgotPassword"
              class="text-blue-400 hover:text-blue-600 cursor-pointer italic text-xs"
            >
              Forgot Password?
            </p>
            <div class="sm:w-1/2 sm:mt-0 mt-2 flex">
              <button
                id="nextButton"
                class="w-full bg-blue-500 text-sm text-white py-3 rounded-md hover:shadow-blue-500 hover:scale-110 duration-500 shadow-lg disabled:opacity-60 disabled:hover:scale-100 disabled:cursor-not-allowed"
                disabled
              >
                Next <i class="fa-solid fa-arrow-right mx-1"></i>
              </button>
            </div>
          </div>
          <div class="border-b border-slate-300 w-full mt-10"></div>

          <div class="mt-3 w-full">
            <p class="w-full text-center text-xs text-slate-400">
              Or login with
            </p>
            <div class="w-full flex items-center justify-center gap-5 mt-3">
              <button
                id="facebookButton"
                class="w-full bg-white py-3 rounded-md hover:shadow-lg hover:shadow-slate-400 border border-slate-300 duration-500"
              >
                <i class="fa-brands fa-facebook mx-1"></i>Facebook
              </button>
              <button
                id="googleButton"
                class="w-full bg-white py-3 rounded-md hover:shadow-lg hover:shadow-slate-400 border border-slate-300 duration-500"
              >
                <i class="fa-brands fa-google mx-1"></i> Google
              </button>
            </div>
            <p class="w-full mt-8 text-center text-xs">
              Don't have an account yet?
              <span
                id="signUpAction"
                class="text-blue-400 underline hover:text-blue-600 cursor-pointer"
                >Sign up</span
              >
            </p>
          </div>
        </div>

        <div
          class="w-full h-full hidden sm:block"
          style="
            background-image: url(https://i.pinimg.com/originals/48/42/41/4842415e5f93c69717a67668fd1fb85b.gif);
          "
        >
          <div
            class="absolute top-5 right-5 flex flex-col items-center justify-end"
          >
            <button
              id="closeButton"
              class="rounded-full bg-slate-100 text-slate-400 hover:bg-black hover:text-white duration-500 ease-in-out w-10 h-10"
            >
              <i class="fa-solid fa-xmark text-xl"></i>
            </button>
          </div>
        </div>
      </div>

      <div
        id="toast"
        class="absolute -top-14 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-xs px-4 py-2 rounded-md opacity-0 pointer-events-none transition duration-300 whitespace-nowrap"
      ></div>
    </div>

    <script>
      const emailInput = document.getElementById("emailInput");
      const nextButton = document.getElementById("nextButton");
      const emailHint = document.getElementById("emailHint");
      const toast = document.getElementById("toast");
      const closeButton = document.getElementById("closeButton");
      const loginCard = document.getElementById("loginCard");
      const forgotPassword = document.getElementById("forgotPassword");
      const signUpAction = document.getElementById("signUpAction");
      const facebookButton = document.getElementById("facebookButton");
      const googleButton = document.getElementById("googleButton");

      let toastTimer = null;

      function showToast(message) {
        toast.textContent = message;
        toast.classList.remove("opacity-0");
        toast.classList.add("opacity-100");

        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove("opacity-100");
          toast.classList.add("opacity-0");
        }, 1800);
      }

      function isEmailValid(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
      }

      function updateEmailState() {
        const valid = isEmailValid(emailInput.value.trim());

        nextButton.disabled = !valid;
        emailInput.classList.toggle("border-green-400", valid);
        emailInput.classList.toggle(
          "border-red-400",
          !valid && emailInput.value.length > 0,
        );

        if (!emailInput.value.length) {
          emailHint.textContent = "Enter a valid email to continue.";
          emailHint.className = "mt-2 text-xs text-slate-400";
          emailInput.classList.remove("border-red-400", "border-green-400");
          return;
        }

        if (valid) {
          emailHint.textContent = "Looks good. You can continue.";
          emailHint.className = "mt-2 text-xs text-green-600";
        } else {
          emailHint.textContent = "That email format looks incorrect.";
          emailHint.className = "mt-2 text-xs text-red-500";
        }
      }

      function simulateProviderLogin(provider, button) {
        const original = button.innerHTML;
        button.disabled = true;
        button.innerHTML =
          '<i class="fa-solid fa-spinner fa-spin mx-1"></i>Connecting';

        setTimeout(() => {
          button.disabled = false;
          button.innerHTML = original;
          showToast(provider + " login is not wired yet.");
        }, 1200);
      }

      emailInput.addEventListener("input", updateEmailState);

      emailInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !nextButton.disabled) {
          nextButton.click();
        }
      });

      nextButton.addEventListener("click", () => {
        showToast("Welcome back, " + emailInput.value.trim() + "!");
      });

      forgotPassword.addEventListener("click", () => {
        showToast("Password reset link sent!");
      });

      signUpAction.addEventListener("click", () => {
        showToast("Sign-up flow starts here (demo).");
      });

      facebookButton.addEventListener("click", () => {
        simulateProviderLogin("Facebook", facebookButton);
      });

      googleButton.addEventListener("click", () => {
        simulateProviderLogin("Google", googleButton);
      });

      closeButton.addEventListener("click", () => {
        loginCard.classList.add("scale-95", "opacity-0");
        setTimeout(() => {
          loginCard.classList.add("hidden");
          showToast("Card closed. Refresh to show it again.");
        }, 250);
      });
    </script>
  </body>
</html>
