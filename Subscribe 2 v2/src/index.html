<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subscribe 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
    <style>
      :root {
        --base: #e9edf3;
        --text: #2c3441;
        --muted: #6f7887;
        --accent: #4f86ff;
        --light-shadow: #ffffff;
        --dark-shadow: #cfd6e1;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 12% 20%, #f8fafc 0, transparent 34%),
          radial-gradient(circle at 88% 82%, #dbe5ff 0, transparent 32%),
          var(--base);
        color: var(--text);
        font-family: "Manrope", sans-serif;
      }

      .neu-card {
        width: min(92vw, 760px);
        border-radius: 28px;
        padding: clamp(1.6rem, 3vw, 2.4rem);
        background: var(--base);
        box-shadow:
          16px 16px 34px var(--dark-shadow),
          -14px -14px 30px var(--light-shadow);
      }

      .neu-close {
        width: 42px;
        height: 42px;
        margin-left: auto;
        border: none;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: var(--base);
        color: var(--muted);
        box-shadow:
          7px 7px 14px var(--dark-shadow),
          -7px -7px 14px var(--light-shadow);
        cursor: pointer;
      }

      .neu-close:active {
        box-shadow:
          inset 5px 5px 10px var(--dark-shadow),
          inset -5px -5px 10px var(--light-shadow);
      }

      .neu-title {
        font-size: clamp(1.45rem, 2.8vw, 2.1rem);
        line-height: 1.2;
        letter-spacing: -0.02em;
        margin: 1.1rem 0 0.45rem;
      }

      .neu-text {
        color: var(--muted);
        line-height: 1.6;
        margin: 0;
      }

      .neu-field {
        margin-top: 1.6rem;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.8rem;
      }

      .neu-input,
      .neu-btn {
        border: none;
        border-radius: 16px;
        font-family: inherit;
      }

      .neu-input {
        background: var(--base);
        padding: 0.95rem 1rem;
        color: var(--text);
        box-shadow:
          inset 5px 5px 11px var(--dark-shadow),
          inset -5px -5px 11px var(--light-shadow);
        min-width: 0;
      }

      .neu-input::placeholder {
        color: #8f97a5;
      }

      .neu-input:focus {
        outline: 2px solid rgba(79, 134, 255, 0.25);
      }

      .neu-btn {
        white-space: nowrap;
        font-weight: 800;
        padding: 0.95rem 1.35rem;
        background: linear-gradient(140deg, #5f93ff, #3f79f9);
        color: #f6f8ff;
        box-shadow:
          8px 8px 16px #c7cfdb,
          -7px -7px 15px #ffffff;
        cursor: pointer;
      }

      .neu-btn:active {
        box-shadow:
          inset 4px 4px 10px #3165d5,
          inset -4px -4px 10px #5f97ff;
      }

      .quote {
        margin: 1.2rem 0 0;
        font-size: 0.9rem;
        color: #6b7382;
      }

      .author {
        margin-top: 0.95rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .author img {
        width: 44px;
        height: 44px;
        object-fit: cover;
        border-radius: 50%;
        box-shadow:
          5px 5px 11px var(--dark-shadow),
          -4px -4px 10px var(--light-shadow);
      }

      .author strong {
        font-size: 0.95rem;
      }

      .author span {
        display: block;
        font-size: 0.75rem;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .neu-field {
          grid-template-columns: 1fr;
        }

        .neu-btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="neu-card">
      <button class="neu-close" aria-label="Close subscribe card">
        <i class="fas fa-xmark"></i>
      </button>

      <h1 class="neu-title">Join 5,800+ builders in one useful email.</h1>
      <p class="neu-text">
        Weekly design and product notes, practical tips, and the occasional
        behind-the-scenes breakdown of what ships and why.
      </p>

      <div class="neu-field">
        <input
          type="email"
          placeholder="Enter your email"
          class="neu-input"
          aria-label="Email address"
        />
        <button class="neu-btn">Sign Me Up</button>
      </div>

      <p class="quote">"The only newsletter I read before coffee."</p>

      <div class="author">
        <img
          src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?auto=format&fit=crop&w=300&q=80"
          alt="Roxie Ray profile picture"
        />
        <p>
          <strong>Roxie Ray</strong>
          <span>Product Designer, Northwind</span>
        </p>
      </div>
    </div>
  </body>
</html>
