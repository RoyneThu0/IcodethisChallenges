<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Picker 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
  </head>
  <body
    class="min-h-screen overflow-hidden bg-[radial-gradient(circle_at_top,#f8fbff_0%,#dbeafe_38%,#c7d2fe_100%)] flex items-center justify-center px-4 py-10"
  >
    <div class="absolute inset-0 -z-10 overflow-hidden">
      <div
        class="absolute -left-24 top-12 h-64 w-64 rounded-full bg-sky-300/35 blur-3xl"
      ></div>
      <div
        class="absolute right-0 bottom-0 h-80 w-80 rounded-full bg-indigo-300/35 blur-3xl"
      ></div>
    </div>

    <div class="relative flex w-full max-w-2xl items-center gap-5 sm:gap-6">
      <div>
        <img
          src="https://png.pngtree.com/png-vector/20230915/ourmid/pngtree-black-vintage-alarm-clock-png-image_10081629.png"
          alt=""
          class="w-12 drop-shadow-md sm:w-14"
        />
      </div>

      <i
        class="fa-solid fa-caret-right absolute left-15 top-1/2 -translate-y-1/2 text-3xl text-white drop-shadow-[0_4px_10px_rgba(59,130,246,0.35)] sm:left-17 sm:text-4xl"
        aria-hidden="true"
      ></i>

      <div
        class="relative w-full max-w-xl overflow-hidden rounded-3xl border border-white/70 bg-white/75 shadow-[0_25px_80px_rgba(59,130,246,0.18)] backdrop-blur-xl"
      >
        <div
          class="pointer-events-none absolute inset-0 bg-[linear-gradient(135deg,rgba(255,255,255,0.95),rgba(255,255,255,0.65))]"
        ></div>
        <div
          class="relative flex items-center justify-center w-full border-b border-slate-200/80 bg-slate-50/80 px-6 py-4"
        >
          <h2
            class="text-center text-sm font-semibold tracking-[0.35em] text-slate-600 sm:text-base"
          >
            SELECT TIME
          </h2>
        </div>
        <div
          class="relative flex flex-col items-center justify-center gap-4 p-6 sm:flex-row sm:gap-5 sm:p-10"
        >
          <select
            class="min-w-20 rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-center text-lg font-semibold text-slate-800 shadow-sm outline-none transition duration-200 hover:-translate-y-0.5 hover:shadow-md focus:border-sky-400 focus:ring-4 focus:ring-sky-200/70"
          >
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
            <option>6</option>
            <option>7</option>
            <option>8</option>
            <option>9</option>
            <option>10</option>
            <option>11</option>
            <option>12</option>
          </select>

          <select
            class="min-w-24 rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-center text-lg font-semibold text-slate-800 shadow-sm outline-none transition duration-200 hover:-translate-y-0.5 hover:shadow-md focus:border-sky-400 focus:ring-4 focus:ring-sky-200/70"
          >
            <option>00</option>
            <option>01</option>
            <option>02</option>
            <option>03</option>
            <option>04</option>
            <option>05</option>
            <option>06</option>
            <option>07</option>
            <option>08</option>
            <option>09</option>
            <option>10</option>
            <option>11</option>
            <option>12</option>
            <option>13</option>
            <option>14</option>
            <option>15</option>
            <option>16</option>
            <option>17</option>
            <option>18</option>
            <option>19</option>
            <option>20</option>
            <option>21</option>
            <option>22</option>
            <option>23</option>
            <option>24</option>
            <option>25</option>
            <option>26</option>
            <option>27</option>
            <option>28</option>
            <option>29</option>
            <option>30</option>
            <option>31</option>
            <option>32</option>
            <option>33</option>
            <option>34</option>
            <option>35</option>
            <option>36</option>
            <option>37</option>
            <option>38</option>
            <option>39</option>
            <option>40</option>
            <option>41</option>
            <option>42</option>
            <option>43</option>
            <option>44</option>
            <option>45</option>
            <option>46</option>
            <option>47</option>
            <option>48</option>
            <option>49</option>
            <option>50</option>
            <option>51</option>
            <option>52</option>
            <option>53</option>
            <option>54</option>
            <option>55</option>
            <option>56</option>
            <option>57</option>
            <option>58</option>
            <option>59</option>
          </select>

          <select
            class="min-w-24 rounded-2xl border border-slate-200 bg-white/90 px-4 py-3 text-center text-lg font-semibold uppercase tracking-[0.2em] text-slate-800 shadow-sm outline-none transition duration-200 hover:-translate-y-0.5 hover:shadow-md focus:border-sky-400 focus:ring-4 focus:ring-sky-200/70"
          >
            <option>am</option>
            <option>pm</option>
          </select>
        </div>
      </div>
    </div>
  </body>
</html>
