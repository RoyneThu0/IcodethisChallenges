<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
  </head>
  <body
    class="bg-gray-100 w-screen min-h-screen flex items-center justify-center"
  >
    <div
      class="bg-white p-10 rounded-lg w-11/12 max-w-md shadow-lg flex flex-col gap-5"
    >
      <div class="w-full flex items-center justify-between">
        <div class="rounded-full flex items-center">
          <div
            class="bg-white hover:shadow-inner shadow-sm duration-300 transition-all ease-in-out shadow-gray-300 hover:shadow-gray-300 w-7 py-2 pl-5 pr-3 rounded-l-full flex items-center justify-center"
          >
            <i class="fa-solid fa-envelope"></i>
          </div>
          <div
            class="bg-white hover:shadow-inner shadow-sm duration-300 transition-all ease-in-out shadow-gray-300 hover:shadow-gray-300 w-7 py-2 pr-5 pl-3 rounded-r-full flex items-center justify-center"
          >
            <i class="fa-solid fa-bell"></i>
          </div>
        </div>
        <div
          class="bg-white hover:shadow-inner shadow-sm duration-300 transition-all ease-in-out shadow-gray-300 hover:shadow-gray-300 w-7 h-7 rounded-full flex items-center justify-center"
        >
          <i class="fa-solid fa-plus"></i>
        </div>
      </div>
    </div>
  </body>
</html>
