<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumbs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
    <style>
      button.crumb {
        background: none;
        border: none;
        padding: 0;
        font: inherit;
        outline: none;
      }
      button.crumb:focus-visible {
        outline: 2px solid #6366f1;
        border-radius: 3px;
      }
    </style>
  </head>
  <body class="w-screen min-h-screen flex items-center justify-center">
    <div
      class="w-11/12 max-w-xl rounded-xl bg-white p-6 shadow-gray-300 shadow-inner"
    >
      <h1 class="text-2xl font-bold text-gray-800 mb-10 tracking-tight">
        Breadcrumbs
      </h1>

      <nav
        aria-label="breadcrumb-1"
        class="mb-8"
        data-breadcrumb="1"
        data-active="4"
      >
        <ol class="flex items-center text-sm">
          <li data-index="0">
            <button class="crumb" data-nav="1-0">Fry</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="1">
            <button class="crumb" data-nav="1-1">Leela</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="2">
            <button class="crumb" data-nav="1-2">Bender</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="3">
            <button class="crumb" data-nav="1-3">Linda</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="4">
            <button class="crumb" data-nav="1-4" aria-current="page">
              Amy
            </button>
          </li>
        </ol>
      </nav>

      <nav
        aria-label="breadcrumb-2"
        class="border-t border-b border-gray-200 py-4 mb-8"
        data-breadcrumb="2"
        data-active="5"
      >
        <ol class="flex items-center text-sm">
          <li data-index="0">
            <button class="crumb" data-nav="2-0" aria-label="Home">
              <i class="fa-solid fa-house text-sm"></i>
            </button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="1">
            <button class="crumb" data-nav="2-1">Peter</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="2">
            <button class="crumb" data-nav="2-2">Lois</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="3">
            <button class="crumb" data-nav="2-3">Chris</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="4">
            <button class="crumb" data-nav="2-4">Cleveland</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="5">
            <button class="crumb" data-nav="2-5" aria-current="page">
              Quagmire
            </button>
          </li>
        </ol>
      </nav>

      <nav aria-label="breadcrumb-3" data-breadcrumb="3" data-active="4">
        <ol class="flex items-center text-sm">
          <li data-index="0">
            <button class="crumb" data-nav="3-0" aria-label="Home">
              <i class="fa-solid fa-house text-sm"></i>
            </button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="1">
            <button class="crumb" data-nav="3-1">Jake</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="2">
            <button class="crumb" data-nav="3-2">Rosa</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="3">
            <button class="crumb" data-nav="3-3">Charles</button>
          </li>
          <li aria-hidden="true">
            <i
              class="fa-solid fa-chevron-right text-gray-300 text-xs px-1 select-none"
            ></i>
          </li>
          <li data-index="4">
            <button class="crumb" data-nav="3-4" aria-current="page">
              Hitchcock
            </button>
          </li>
        </ol>
      </nav>

      <script>
        const configs = {
          1: {
            past: "text-gray-400 hover:text-gray-700 cursor-pointer",
            active: "font-semibold text-gray-900 cursor-default",
            future: "text-gray-300 hover:text-gray-500 cursor-pointer",
          },
          2: {
            past: "text-blue-400 hover:text-blue-700 cursor-pointer",
            active: "font-semibold text-gray-900 cursor-default",
            future: "text-gray-300 hover:text-gray-500 cursor-pointer",
          },
          3: {
            past: "text-blue-400 hover:text-blue-700 cursor-pointer",
            active: "text-gray-500 font-medium cursor-default",
            future: "text-gray-300 hover:text-gray-500 cursor-pointer",
          },
        };

        function applyStyles(nav) {
          const navId = nav.dataset.breadcrumb;
          const active = parseInt(nav.dataset.active, 10);
          const cfg = configs[navId];
          const items = nav.querySelectorAll("li[data-index]");

          items.forEach((li) => {
            const idx = parseInt(li.dataset.index, 10);
            const btn = li.querySelector("button.crumb");
            // reset classes
            btn.className = "crumb transition-colors duration-150 ";
            if (idx < active) {
              btn.className += cfg.past;
              btn.removeAttribute("aria-current");
            } else if (idx === active) {
              btn.className += cfg.active;
              btn.setAttribute("aria-current", "page");
            } else {
              btn.className += cfg.future;
              btn.removeAttribute("aria-current");
            }
          });
        }

        document.querySelectorAll("nav[data-breadcrumb]").forEach((nav) => {
          applyStyles(nav);
        });

        document.querySelectorAll("button.crumb").forEach((btn) => {
          btn.addEventListener("click", () => {
            const [navId, idxStr] = btn.dataset.nav.split("-");
            const nav = document.querySelector(
              `nav[data-breadcrumb="${navId}"]`,
            );
            nav.dataset.active = idxStr;
            applyStyles(nav);
          });
        });
      </script>
    </div>
  </body>
</html>
