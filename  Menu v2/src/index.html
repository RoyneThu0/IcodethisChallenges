<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body
    class="relative w-screen h-screen bg-slate-50 flex items-start justify-center"
  >
    <div
      class="absolute z-0 top-20 right-20 rounded-full bg-fuchsia-300 shadow-2xl shadow-fuchsia-300 w-96 h-96 animate-pulse"
    ></div>
    <div
      class="absolute z-0 top-40 left-96 rounded-full bg-cyan-300 shadow-2xl shadow-cyan-300 w-60 h-60 animate animate-pulse"
    ></div>
    <div
      class="absolute z-0 bottom-24 left-24 rounded-full bg-yellow-200 shadow-2xl shadow-yellow-200 w-96 h-96"
    ></div>
    <div
      class="w-screen h-screen absolute items-start z-10 bg-gray-100 rounded-md bg-clip-padding backdrop-filter backdrop-blur-3xl bg-opacity-0 border border-gray-100 flex sm:items-center mt-10 justify-center"
    >
      <div
        class="w-11/12 max-w-5xl border-2 border-white rounded-3xl mt-10 md:mt-0 shadow-sm shadow-slate-200"
      >
        <div
          class="w-full p-7 backdrop-filter backdrop-blur-lg bg-opacity-70 bg-purple-50 border-8 border-white gap-3 rounded-2xl grid md:grid-cols-2 grid-cols-1"
        >
          <div class="w-full grid md:grid-cols-4 grid-cols-2 items-center">
            <div class="relative w-full dropdown-wrapper">
              <button
                class="w-full hover:bg-white rounded-md py-3 p-1 text-sm duration-300 ease-in-out dropdown-toggle"
                onclick="toggleDropdown(this)"
              >
                FRAMEWORK
              </button>
              <div
                class="dropdown-menu absolute hidden bg-white shadow-md rounded-md mt-1 w-56 z-20 overflow-hidden"
              >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-table-cells-large text-indigo-500"></i
                  >Grid</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-chart-column text-indigo-500"></i
                  >Charts</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-sliders text-indigo-500"></i
                  >Controls</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-chart-line text-indigo-500"></i
                  >Financial Chart</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-gauge-high text-indigo-500"></i
                  >Gauge</a
                >
              </div>
            </div>
            <div class="relative w-full dropdown-wrapper">
              <button
                class="w-full hover:bg-white rounded-md py-3 p-1 text-sm duration-300 ease-in-out dropdown-toggle"
                onclick="toggleDropdown(this)"
              >
                DEMOS
              </button>
              <div
                class="dropdown-menu absolute hidden bg-white shadow-md rounded-md mt-1 w-56 z-20 overflow-hidden"
              >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-house text-cyan-600"></i>Dashboard</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-chart-pie text-cyan-600"></i
                  >Analytics</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-store text-cyan-600"></i>Ecommerce</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-user-group text-cyan-600"></i>CRM</a
                >
                <a
                  href="#"
                  class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100"
                  ><i class="fa-solid fa-screwdriver-wrench text-cyan-600"></i
                  >Admin Tools</a
                >
              </div>
            </div>
            <div class="relative w-full dropdown-wrapper">
              <button
                class="w-full hover:bg-white rounded-md py-3 p-1 text-sm duration-300 ease-in-out dropdown-toggle"
                onclick="toggleDropdown(this)"
              >
                RESOURCES
              </button>
              <div
                class="dropdown-menu absolute hidden bg-white text-slate-200 shadow-2xl rounded-2xl mt-2 w-[680px] max-w-[92vw] -left-8 md:-left-48 z-20 border border-slate-700 p-6"
              >
                <div class="grid md:grid-cols-2 grid-cols-1 gap-6">
                  <div class="md:border-r md:border-slate-700 md:pr-6">
                    <p class="text-xs tracking-[0.2em] text-cyan-600 mb-4">
                      TOP CONTROLS
                    </p>
                    <div class="space-y-3">
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i
                          class="fa-solid fa-table-cells-large text-cyan-600"
                        ></i
                        ><span>Grid</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-solid fa-chart-column text-cyan-600"></i
                        ><span>Chart</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-solid fa-sliders text-cyan-600"></i
                        ><span>Controls</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-solid fa-arrow-trend-up text-cyan-600"></i
                        ><span>Financial Chart</span></a
                      >
                    </div>
                  </div>
                  <div>
                    <div class="space-y-3 pt-6 md:pt-0">
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-solid fa-code text-cyan-600"></i
                        ><span>API</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-regular fa-file-lines text-cyan-600"></i
                        ><span>Blogs</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i
                          class="fa-regular fa-rectangle-list text-cyan-600"
                        ></i
                        ><span>Knowledge Base</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-regular fa-circle-play text-cyan-600"></i
                        ><span>Videos</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-regular fa-message text-cyan-600"></i
                        ><span>Forums</span></a
                      >
                      <a
                        href="#"
                        class="flex items-center gap-3 text-gray-600 hover:text-black"
                        ><i class="fa-regular fa-shield text-cyan-600"></i
                        ><span>Licensing</span></a
                      >
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div class="relative w-full dropdown-wrapper">
              <button
                class="md:w-fit md:ml-2 hover:bg-white rounded-md py-3 p-1 text-sm duration-300 ease-in-out dropdown-toggle"
                onclick="toggleDropdown(this)"
              >
                DOCUMENTATION
              </button>
              <div
                class="dropdown-menu absolute hidden bg-white shadow-md rounded-xl mt-1 w-64 md:right-0 z-20 overflow-hidden border border-slate-100"
              >
                <a
                  href="#"
                  class="flex items-center justify-between px-4 py-3 hover:bg-slate-100"
                  ><span>Getting Started</span
                  ><i class="fa-solid fa-arrow-right text-xs text-slate-400"></i
                ></a>
                <a
                  href="#"
                  class="flex items-center justify-between px-4 py-3 hover:bg-slate-100"
                  ><span>Components</span
                  ><i class="fa-solid fa-arrow-right text-xs text-slate-400"></i
                ></a>
                <a
                  href="#"
                  class="flex items-center justify-between px-4 py-3 hover:bg-slate-100"
                  ><span>Layout Guides</span
                  ><i class="fa-solid fa-arrow-right text-xs text-slate-400"></i
                ></a>
                <a
                  href="#"
                  class="flex items-center justify-between px-4 py-3 hover:bg-slate-100"
                  ><span>Accessibility</span
                  ><i class="fa-solid fa-arrow-right text-xs text-slate-400"></i
                ></a>
                <a
                  href="#"
                  class="flex items-center justify-between px-4 py-3 hover:bg-slate-100"
                  ><span>Release Notes</span
                  ><i class="fa-solid fa-arrow-right text-xs text-slate-400"></i
                ></a>
              </div>
            </div>
          </div>
          <div
            class="w-full flex items-center md:justify-end justify-center gap-2"
          >
            <button
              class="sm:w-1/6 w-full text-sm rounded-md flex items-center justify-center hover:bg-slate-900 hover:text-white duration-500 ease-in-out py-3"
            >
              LOG IN
            </button>
            <button
              class="sm:w-1/6 w-full text-sm rounded-md flex items-center justify-center hover:bg-slate-500 bg-slate-900 py-3 duration-500 ease-in-out text-white"
            >
              SIGN UP
            </button>
          </div>
        </div>
      </div>
    </div>
    <script>
      function toggleDropdown(button) {
        // Close any open dropdowns
        document.querySelectorAll(".dropdown-menu").forEach((menu) => {
          if (menu !== button.nextElementSibling) {
            menu.classList.add("hidden");
          }
        });

        // Toggle the clicked dropdown
        const dropdown = button.nextElementSibling;
        dropdown.classList.toggle("hidden");
      }

      // Close dropdowns when clicking outside
      window.addEventListener("click", function (event) {
        if (!event.target.closest(".dropdown-wrapper")) {
          document.querySelectorAll(".dropdown-menu").forEach((menu) => {
            menu.classList.add("hidden");
          });
        }
      });
    </script>
  </body>
</html>
