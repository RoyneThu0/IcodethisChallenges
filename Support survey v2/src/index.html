<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Survey</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="./output.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="noreferrer"
    />
  </head>
  <body
    class="min-h-screen flex items-center justify-center bg-cover bg-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1623150502742-6a849aa94be4?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    "
  >
    <div
      id="surveyCard"
      class="w-full max-w-md overflow-hidden rounded-2xl border border-white/10 bg-gray-800/90 shadow-2xl shadow-black/30 backdrop-blur"
    >
      <div class="flex items-center justify-between bg-slate-900/80 px-4 py-3">
        <div class="flex items-center gap-2">
          <p class="text-sm font-semibold tracking-wide text-slate-200">
            Support survey
          </p>
        </div>
        <button
          type="button"
          id="toggleButton"
          class="flex h-8 w-8 items-center justify-center rounded-full border border-white/10 bg-slate-700/80 text-slate-100 transition hover:bg-sky-600 hover:text-white"
          aria-expanded="true"
          aria-controls="surveyContent"
          onclick="toggleSurvey()"
        >
          <i id="toggleIcon" class="fa-solid fa-minus text-sm"></i>
        </button>
      </div>

      <div id="surveyContent" class="p-8 sm:p-10">
        <p
          class="mb-6 text-center text-2xl font-semibold leading-tight text-slate-50"
        >
          Why did you come to our <br />
          support site today?
        </p>

        <ul class="space-y-3">
          <li
            class="flex w-full items-start justify-start rounded-xl border border-slate-600/80 bg-slate-700/60 p-4 transition duration-200 hover:-translate-y-0.5 hover:border-sky-400 hover:bg-sky-600"
          >
            <p class="text-sm text-slate-100">
              I found some bugs and I want to report them.
            </p>
          </li>
          <li
            class="flex w-full items-start justify-start rounded-xl border border-slate-600/80 bg-slate-700/60 p-4 transition duration-200 hover:-translate-y-0.5 hover:border-sky-400 hover:bg-sky-600"
          >
            <p class="text-sm text-slate-100">I can't post to the forum.</p>
          </li>
          <li
            class="flex w-full items-start justify-start rounded-xl border border-slate-600/80 bg-slate-700/60 p-4 transition duration-200 hover:-translate-y-0.5 hover:border-sky-400 hover:bg-sky-600"
          >
            <p class="text-sm text-slate-100">
              I have in game purchasing issues.
            </p>
          </li>
        </ul>
        <div class="mt-6">
          <button
            class="w-full rounded-xl bg-gradient-to-r from-gray-200 to-gray-500 py-2.5 font-medium text-white transition hover:brightness-110"
          >
            Continue
          </button>
        </div>
      </div>
    </div>

    <script>
      function toggleSurvey() {
        const content = document.getElementById("surveyContent");
        const icon = document.getElementById("toggleIcon");
        const button = document.getElementById("toggleButton");

        const isCollapsed = content.classList.toggle("hidden");
        icon.classList.toggle("fa-minus", !isCollapsed);
        icon.classList.toggle("fa-plus", isCollapsed);
        button.setAttribute("aria-expanded", String(!isCollapsed));
      }
    </script>
  </body>
</html>
