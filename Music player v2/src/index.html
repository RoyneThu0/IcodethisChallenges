<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      /* Transition for smooth and slow background change */
      body {
        transition: background 30s ease;
      }

      #playlist {
        list-style: none;
        padding: 0;
        margin: 0.5rem 0 0 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #playlist li {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 14px;
        border-radius: 999px;
        background: #f3f4f6;
        border: 1.5px solid transparent;
        cursor: pointer;
        transition:
          background 0.2s,
          border-color 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
      }

      #playlist li .pill-num {
        font-size: 0.7rem;
        font-weight: 700;
        color: #9ca3af;
        width: 16px;
        text-align: center;
        flex-shrink: 0;
        transition: color 0.2s;
      }

      #playlist li .pill-title {
        flex: 1;
        font-size: 0.82rem;
        font-weight: 600;
        color: #374151;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: left;
        transition: color 0.2s;
      }

      #playlist li .pill-icon {
        font-size: 0.65rem;
        color: #d1d5db;
        transition:
          color 0.2s,
          transform 0.2s;
        flex-shrink: 0;
      }

      #playlist li:hover {
        background: #e0e7ff;
        border-color: #c7d2fe;
        transform: translateX(3px);
      }

      #playlist li:hover .pill-num {
        color: #6366f1;
      }

      #playlist li:hover .pill-title {
        color: #4338ca;
      }

      #playlist li:hover .pill-icon {
        color: #818cf8;
      }

      #playlist li.highlight {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border-color: #4338ca;
        box-shadow: 0 4px 14px rgba(99, 102, 241, 0.35);
        transform: translateX(3px);
      }

      #playlist li.highlight .pill-num,
      #playlist li.highlight .pill-title,
      #playlist li.highlight .pill-icon {
        color: #fff;
      }

      #playlist li.highlight:hover {
        background: linear-gradient(135deg, #818cf8, #6366f1);
      }

      .active-icon {
        color: #4f46e5;
      }
    </style>
  </head>
  <body
    class="flex items-center mt-5 justify-center min-h-screen bg-gray-100"
    id="body"
  >
    <div id="player-container">
      <div id="track-info"></div>
      <div
        class="bg-white w-[250] rounded-lg shadow-slate-700/30 shadow-xl p-6"
      >
        <div class="text-center">
          <p class="text-sm text-gray-500">PLAYING NOW</p>
          <h2 id="track-title" class="text-2xl font-bold font-serif">
            Track Title
          </h2>
          <h3 id="track-artist" class="text-xs text-slate-500 font-semibold">
            Artist Name
          </h3>
        </div>

        <img
          id="album-cover"
          src=""
          alt="Album Cover"
          class="w-full h-72 rounded-lg mb-5 shadow-lg shadow-slate-600"
        />

        <div class="flex justify-center items-center space-x-4">
          <span id="currentTime">0:00</span>
          <input
            type="range"
            id="progressBar"
            class="w-full"
            min="0"
            max="100"
            value="0"
          />
          <span id="duration">0:00</span>
        </div>

        <div class="flex justify-center items-center space-x-4 my-4">
          <button
            onclick="toggleShuffle()"
            id="shuffleButton"
            class="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-indigo-500 transition-colors duration-200"
            title="Shuffle"
          >
            <i class="fa-solid fa-shuffle text-base"></i>
          </button>

          <button
            onclick="previousTrack()"
            class="w-11 h-11 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 shadow transition-all duration-200 hover:scale-105"
            title="Previous"
          >
            <i class="fa-solid fa-backward-step text-lg"></i>
          </button>

          <button
            onclick="togglePlay()"
            id="playPauseButton"
            class="w-14 h-14 flex items-center justify-center rounded-full bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200 transition-all duration-200 hover:scale-105 active:scale-95"
            title="Play / Pause"
          >
            <i class="fa-solid fa-play text-xl"></i>
          </button>

          <button
            onclick="nextTrack()"
            class="w-11 h-11 flex items-center justify-center rounded-full bg-gray-100 hover:bg-gray-200 text-gray-600 shadow transition-all duration-200 hover:scale-105"
            title="Next"
          >
            <i class="fa-solid fa-forward-step text-lg"></i>
          </button>

          <button
            onclick="toggleRepeat()"
            id="repeatButton"
            class="w-9 h-9 flex items-center justify-center rounded-full text-gray-400 hover:text-indigo-500 transition-colors duration-200"
            title="Repeat"
          >
            <i class="fa-solid fa-repeat text-base"></i>
          </button>
        </div>

        <ul id="playlist">
          <li onclick="selectTrack(0)">
            <span class="pill-num">1</span>
            <span class="pill-title">Blind Faith</span>
            <i class="fa-solid fa-music pill-icon"></i>
          </li>
          <li onclick="selectTrack(1)">
            <span class="pill-num">2</span>
            <span class="pill-title">Night Alone</span>
            <i class="fa-solid fa-music pill-icon"></i>
          </li>
          <li onclick="selectTrack(2)">
            <span class="pill-num">3</span>
            <span class="pill-title">Future — TEFLON</span>
            <i class="fa-solid fa-music pill-icon"></i>
          </li>
          <li onclick="selectTrack(3)">
            <span class="pill-num">4</span>
            <span class="pill-title">Don't Care</span>
            <i class="fa-solid fa-music pill-icon"></i>
          </li>
          <li onclick="selectTrack(4)">
            <span class="pill-num">5</span>
            <span class="pill-title">IVOXYGEN — LIKE</span>
            <i class="fa-solid fa-music pill-icon"></i>
          </li>
        </ul>
      </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script>
      const songs = [
        {
          title: "Blind Faith",
          artist: "Drake ft Billie Eilish",
          url: "https://github.com/RoyneThu0/Stream-songs/raw/main/Blind%20Faith%20Drake%20ft%20Billie%20Eilish.mp3",
          gradient: "radial-gradient(circle, #E49E04, #B603DC)",

          cover:
            "https://i1.sndcdn.com/artworks-dGTdPTaN9BNCRcs1-BcRX2Q-t500x500.jpg",
          duration: "4:18",
        },
        {
          title: "Alone",
          artist: "Night Lovell",
          url: "https://github.com/RoyneThu0/Stream-songs/raw/main/Night-Alone.mp3",
          gradient: "radial-gradient(circle, #48BED8, #1a5442)",

          cover:
            "https://i1.sndcdn.com/artworks-0FeU2SzTobiADfLj-uKLEvg-t500x500.jpg",
          duration: "3:27",
        },
        {
          title: "TEFLON",
          artist: "Future",
          url: "https://github.com/RoyneThu0/Stream-songs/raw/main/Future-TEFLON.mp3",
          gradient: "radial-gradient(circle, #fe5fd8, #000000)",
          cover: "https://i1.sndcdn.com/artworks-Eb0eOiPUarnu-0-t500x500.jpg",
          duration: "5:22",
        },
        {
          title: "I Don't Care",
          artist: "Violent Vira",
          url: "https://github.com/RoyneThu0/Stream-songs/raw/main/don%E2%80%99t%20care%20-%20vira.mp3",
          gradient: "radial-gradient(circle, #E40436, #1C1C1C)",

          cover:
            "https://i1.sndcdn.com/artworks-FOhzrayjIbmKkzxR-MDcXiw-t500x500.jpg",
          duration: "4:18",
        },
        {
          title: "Life Like this",
          artist: "IVOXYGEN",
          url: "https://github.com/RoyneThu0/Stream-songs/raw/main/IVOXYGEN-LIKE.mp3",
          gradient: "radial-gradient(circle, #04D3E4, #EA86FF)",

          cover:
            "https://i1.sndcdn.com/artworks-1BaPHthgzBwKSgT3-FnysPA-t500x500.jpg",
          duration: "3:02",
        },
      ];

      let isPlaying = false;
      let currentTrack = 0;
      const audioPlayer = document.getElementById("audioPlayer");
      const playPauseButton = document.getElementById("playPauseButton");
      const progressBar = document.getElementById("progressBar");
      const currentTimeElem = document.getElementById("currentTime");
      const durationElem = document.getElementById("duration");

      audioPlayer.addEventListener("timeupdate", updateProgressBar);
      audioPlayer.addEventListener("ended", () => {
        if (isRepeat) {
          audioPlayer.currentTime = 0;
          isPlaying = false;
          togglePlay();
        } else {
          nextTrack();
        }
      });
      progressBar.addEventListener("input", seek);

      function togglePlay() {
        if (isPlaying) {
          audioPlayer.pause();
          playPauseButton.innerHTML =
            '<i class="fa-solid fa-play text-xl"></i>';
        } else {
          audioPlayer.play();
          playPauseButton.innerHTML =
            '<i class="fa-solid fa-pause text-xl"></i>';
        }
        isPlaying = !isPlaying;
      }

      function updateProgressBar() {
        const currentTime = audioPlayer.currentTime;
        const duration = audioPlayer.duration;
        progressBar.value = (currentTime / duration) * 100;
        currentTimeElem.textContent = formatTime(currentTime);
        durationElem.textContent = formatTime(duration);
      }

      function seek() {
        const seekTime = (progressBar.value / 100) * audioPlayer.duration;
        audioPlayer.currentTime = seekTime;
      }

      function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? "0" + secs : secs}`;
      }

      function loadTrack(trackIndex) {
        const track = songs[trackIndex];
        audioPlayer.src = track.url;
        document.getElementById("track-title").textContent = track.title;
        document.getElementById("track-artist").textContent = track.artist;
        document.getElementById("album-cover").src = track.cover;
        changeBackgroundColor(trackIndex); // Change background color
        audioPlayer.addEventListener("loadedmetadata", () => {
          durationElem.textContent = formatTime(audioPlayer.duration);
        });
      }

      let isShuffle = false;
      let isRepeat = false;

      function toggleShuffle() {
        isShuffle = !isShuffle;
        const btn = document.getElementById("shuffleButton");
        btn.classList.toggle("text-indigo-500", isShuffle);
        btn.classList.toggle("text-gray-400", !isShuffle);
      }

      function toggleRepeat() {
        isRepeat = !isRepeat;
        const btn = document.getElementById("repeatButton");
        btn.classList.toggle("text-indigo-500", isRepeat);
        btn.classList.toggle("text-gray-400", !isRepeat);
      }

      function nextTrack() {
        if (isShuffle) {
          let random;
          do {
            random = Math.floor(Math.random() * songs.length);
          } while (random === currentTrack && songs.length > 1);
          currentTrack = random;
        } else {
          currentTrack = (currentTrack + 1) % songs.length;
        }
        loadTrack(currentTrack);
        isPlaying = false;
        togglePlay();
      }

      function previousTrack() {
        currentTrack = (currentTrack - 1 + songs.length) % songs.length;
        loadTrack(currentTrack);
        isPlaying = false;
        togglePlay();
      }

      function selectTrack(trackIndex) {
        currentTrack = trackIndex;
        loadTrack(currentTrack);
        isPlaying = false;
        togglePlay();
      }

      // Function to change background color
      function changeBackgroundColor(trackIndex) {
        const track = songs[trackIndex];
        document.body.style.background = track.gradient;
      }

      // Retain user background color functionality
      function setUserBackgroundColor(color) {
        document.body.style.backgroundColor = color;
      }

      // Set a default or user-selected background color initially
      setUserBackgroundColor("#f0f0f0");
      loadTrack(currentTrack);
    </script>
  </body>
</html>
