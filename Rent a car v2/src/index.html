<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rent A Car</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }

      .toggle-switch {
        position: relative;
        width: 42px;
        height: 24px;
        flex-shrink: 0;
      }
      .toggle-switch .track {
        position: absolute;
        inset: 0;
        background: #d1d5db;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.25s ease;
      }
      .toggle-switch .track::after {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 18px;
        height: 18px;
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
        transition: transform 0.25s ease;
      }
      .toggle-switch input:checked + .track {
        background: #f97316;
      }
      .toggle-switch input:checked + .track::after {
        transform: translateX(18px);
      }

      .input-field {
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }
      .input-field:focus {
        outline: none;
        border-color: #f97316 !important;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.13);
      }

      .date-box {
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }
      .date-box:focus-within {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.13);
      }

      .deliver-reveal {
        display: grid;
        grid-template-rows: 0fr;
        opacity: 0;
        transition:
          grid-template-rows 0.35s ease,
          opacity 0.3s ease,
          margin-top 0.35s ease;
        margin-top: 0;
      }
      .deliver-reveal.open {
        grid-template-rows: 1fr;
        opacity: 1;
        margin-top: 0.75rem;
      }
      .deliver-reveal > div {
        overflow: hidden;
      }

      .tooltip-wrap {
        position: relative;
      }
      .tooltip-wrap .tip {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        background: #1e293b;
        color: #f8fafc;
        font-size: 0.68rem;
        line-height: 1.4;
        white-space: nowrap;
        padding: 5px 10px;
        border-radius: 7px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: 99;
      }
      .tooltip-wrap .tip::after {
        content: "";
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        border: 5px solid transparent;
        border-top-color: #1e293b;
      }
      .tooltip-wrap:hover .tip {
        opacity: 1;
      }

      .search-btn {
        background: linear-gradient(135deg, #fb923c, #ea580c);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        position: relative;
        overflow: hidden;
      }
      .search-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.18),
          transparent
        );
        transition: left 0.5s ease;
      }
      .search-btn:hover::before {
        left: 100%;
      }
      .search-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 26px rgba(234, 88, 12, 0.42);
      }
      .search-btn:active {
        transform: translateY(0);
        box-shadow: 0 3px 10px rgba(234, 88, 12, 0.3);
      }

      .feature-item {
        transition: background 0.15s ease;
        border-radius: 0.5rem;
      }
      .feature-item:hover {
        background: rgba(249, 115, 22, 0.07);
      }

      input[type="date"]::-webkit-calendar-picker-indicator,
      input[type="time"]::-webkit-calendar-picker-indicator {
        cursor: pointer;
        opacity: 0.4;
        transition: opacity 0.15s;
      }
      input[type="date"]::-webkit-calendar-picker-indicator:hover,
      input[type="time"]::-webkit-calendar-picker-indicator:hover {
        opacity: 0.85;
      }
    </style>
  </head>

  <body
    class="w-screen min-h-screen flex items-center justify-center py-10 bg-cover bg-center"
    style="
      background-image: url(https://images.unsplash.com/photo-1571456653714-a8db063a3e91?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D);
    "
  >
    <div class="fixed inset-0 bg-black/35 pointer-events-none"></div>

    <div
      class="fixed z-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[560px] h-[600px] pointer-events-none"
    >
      <div
        class="absolute -top-6 -left-12 w-52 h-72 bg-amber-400 rounded-3xl opacity-90 rotate-6 shadow-2xl"
      ></div>
      <div
        class="absolute -bottom-6 -right-6 w-40 h-40 bg-orange-500 rounded-3xl opacity-90 -rotate-6 shadow-2xl"
      ></div>
    </div>

    <div
      class="relative z-10 w-11/12 max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden"
    >
      <div
        class="h-1.5 bg-gradient-to-r from-amber-400 via-orange-500 to-orange-600"
      ></div>

      <div class="px-8 py-8 sm:px-10 sm:py-9">
        <div class="flex items-center gap-3 mb-7">
          <div
            class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center shadow-sm shrink-0"
          >
            <i class="fa-solid fa-car-side text-orange-500 text-base"></i>
          </div>
          <div>
            <h1 class="text-xl font-bold text-slate-800 leading-tight">
              Search for a rental car
            </h1>
            <p class="text-xs text-slate-400 font-medium mt-0.5">
              Best prices guaranteed
            </p>
          </div>
        </div>

        <label
          for="location"
          class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest mb-1.5"
        >
          Pick-up Location
        </label>
        <div class="relative">
          <i
            class="fa-solid fa-location-dot absolute left-3.5 top-1/2 -translate-y-1/2 text-orange-400 text-sm pointer-events-none"
          ></i>
          <input
            type="text"
            placeholder="City, airport, region, district..."
            name="location"
            id="location"
            class="input-field w-full h-11 pl-10 pr-4 border border-slate-200 rounded-xl text-sm text-slate-700 bg-slate-50 placeholder:text-slate-300"
          />
        </div>

        <div class="flex items-center gap-3 mt-4">
          <label class="toggle-switch">
            <input
              type="checkbox"
              class="sr-only"
              id="deliver"
              name="deliver"
              onchange="toggleDeliver(this)"
            />
            <div class="track"></div>
          </label>
          <label
            for="deliver"
            class="text-sm text-slate-600 cursor-pointer select-none"
          >
            Deliver the car somewhere else
          </label>
        </div>

        <div class="deliver-reveal" id="deliver-reveal">
          <div>
            <div class="relative">
              <i
                class="fa-solid fa-flag-checkered absolute left-3.5 top-1/2 -translate-y-1/2 text-orange-400 text-sm pointer-events-none"
              ></i>
              <input
                type="text"
                placeholder="Drop-off city, airport, region..."
                name="delivery-location"
                id="delivery-location"
                class="input-field w-full h-11 pl-10 pr-4 border border-slate-200 rounded-xl text-sm text-slate-700 bg-slate-50 placeholder:text-slate-300"
              />
            </div>
          </div>
        </div>

        <div class="grid sm:grid-cols-2 grid-cols-1 mt-5 gap-3">
          <div class="space-y-2">
            <span
              class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest"
              >Date of pickup</span
            >
            <div
              class="date-box border border-slate-200 rounded-xl px-3 py-2.5 bg-slate-50 flex items-center gap-2"
            >
              <i
                class="fa-solid fa-calendar-days text-orange-400 text-sm shrink-0"
              ></i>
              <input
                type="date"
                class="bg-transparent text-sm text-slate-600 w-full focus:outline-none"
              />
            </div>
            <div
              class="date-box border border-slate-200 rounded-xl px-3 py-2.5 bg-slate-50 flex items-center gap-2"
            >
              <i
                class="fa-regular fa-clock text-orange-400 text-sm shrink-0"
              ></i>
              <input
                type="time"
                class="bg-transparent text-sm text-slate-600 w-full focus:outline-none"
              />
            </div>
          </div>

          <div class="space-y-2">
            <span
              class="block text-[11px] font-semibold text-slate-400 uppercase tracking-widest"
              >Date of delivery</span
            >
            <div
              class="date-box border border-slate-200 rounded-xl px-3 py-2.5 bg-slate-50 flex items-center gap-2"
            >
              <i
                class="fa-solid fa-calendar-days text-orange-400 text-sm shrink-0"
              ></i>
              <input
                type="date"
                class="bg-transparent text-sm text-slate-600 w-full focus:outline-none"
              />
            </div>
            <div
              class="date-box border border-slate-200 rounded-xl px-3 py-2.5 bg-slate-50 flex items-center gap-2"
            >
              <i
                class="fa-regular fa-clock text-orange-400 text-sm shrink-0"
              ></i>
              <input
                type="time"
                class="bg-transparent text-sm text-slate-600 w-full focus:outline-none"
              />
            </div>
          </div>
        </div>

        <div class="flex items-center gap-3 mt-4">
          <label class="toggle-switch">
            <input type="checkbox" class="sr-only" id="age" name="age" />
            <div class="track"></div>
          </label>
          <label
            for="age"
            class="text-sm text-slate-600 cursor-pointer select-none flex-1"
          >
            The driver's age is between 30 and 65?
          </label>
          <div class="tooltip-wrap">
            <i
              class="fa-solid fa-circle-info text-slate-300 hover:text-orange-400 cursor-pointer transition-colors duration-200 text-base"
            ></i>
            <div class="tip">
              Age requirements may affect<br />rental price and eligibility
            </div>
          </div>
        </div>

        <div
          class="mt-5 rounded-xl bg-orange-50 border border-orange-100 px-3 py-2.5 space-y-0.5"
        >
          <div class="feature-item flex items-center gap-2.5 px-2 py-1.5">
            <span
              class="w-5 h-5 rounded-full bg-green-100 flex items-center justify-center shrink-0"
            >
              <i
                class="fa-solid fa-check text-green-600"
                style="font-size: 9px"
              ></i>
            </span>
            <span class="text-sm font-medium text-slate-700"
              >No credit card fees</span
            >
          </div>
          <div class="feature-item flex items-center gap-2.5 px-2 py-1.5">
            <span
              class="w-5 h-5 rounded-full bg-green-100 flex items-center justify-center shrink-0"
            >
              <i
                class="fa-solid fa-check text-green-600"
                style="font-size: 9px"
              ></i>
            </span>
            <span class="text-sm font-medium text-slate-700"
              >No change fees</span
            >
          </div>
          <div class="feature-item flex items-center gap-2.5 px-2 py-1.5">
            <span
              class="w-5 h-5 rounded-full bg-green-100 flex items-center justify-center shrink-0"
            >
              <i
                class="fa-solid fa-check text-green-600"
                style="font-size: 9px"
              ></i>
            </span>
            <span class="text-sm font-medium text-slate-700"
              >Price Match Guarantee</span
            >
          </div>
        </div>

        <button
          class="search-btn w-full text-white font-semibold mt-5 py-3.5 rounded-xl flex items-center justify-center gap-2 text-sm tracking-wide"
        >
          <i class="fa-solid fa-magnifying-glass"></i>
          Search
        </button>
      </div>
    </div>

    <script>
      function toggleDeliver(checkbox) {
        const reveal = document.getElementById("deliver-reveal");
        if (checkbox.checked) {
          reveal.classList.add("open");
          setTimeout(
            () => document.getElementById("delivery-location").focus(),
            360,
          );
        } else {
          reveal.classList.remove("open");
        }
      }
    </script>
  </body>
</html>
